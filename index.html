<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus</title>
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async id="MathJax-script"></script>
<script>
window.MathJax = {
  tex: { inlineMath: [['$','$'],['\\(','\\)']], displayMath: [['$$','$$'],['\\[','\\]']] },
  svg: { fontCache: 'global' },
  startup: { ready() { MathJax.startup.defaultReady(); } }
};
</script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0f0a;
    --surface: #111810;
    --surface2: #182015;
    --border: #1f2b1a;
    --border2: #2a3b22;
    --text: #e8ede4;
    --text2: #b8c4b0;
    --muted: #5a6b52;
    --accent: #6b8f4e;
    --accent2: #8fb870;
    --accent-glow: rgba(107,143,78,0.12);
    --accent-light: #a8d080;
    --user-bg: #0d1a0a;
    --user-border: #1a2e14;
    --red: #e87070;
    --blue: #5b8fd4;
  }

  * { -webkit-font-smoothing: antialiased; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Subtle grain texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  /* LOGIN */
  #login-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100dvh;
    gap: 3rem;
    padding: 2rem;
    position: relative;
    z-index: 1;
  }

  .login-orb {
    position: relative;
    width: 96px;
    height: 96px;
  }

  /* Apple water drop inspired */
  .orb-drop {
    width: 96px;
    height: 96px;
    background: radial-gradient(ellipse at 35% 30%, #c8e8a0, #6b8f4e 45%, #2a4a1a 80%, #0f1f0a);
    border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
    box-shadow:
      0 20px 60px rgba(107,143,78,0.25),
      0 8px 20px rgba(107,143,78,0.15),
      inset 0 2px 8px rgba(255,255,255,0.15),
      inset 0 -4px 12px rgba(0,0,0,0.3);
    animation: dropFloat 4s ease-in-out infinite;
    position: relative;
  }

  .orb-drop::after {
    content: 'Nx';
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.2rem;
    font-weight: 500;
    color: rgba(255,255,255,0.9);
    text-shadow: 0 1px 4px rgba(0,0,0,0.4);
  }

  .orb-reflection {
    position: absolute;
    top: 12%;
    left: 22%;
    width: 30%;
    height: 18%;
    background: radial-gradient(ellipse, rgba(255,255,255,0.5) 0%, transparent 70%);
    border-radius: 50%;
    transform: rotate(-20deg);
  }

  @keyframes dropFloat {
    0%, 100% { transform: translateY(0) scale(1); border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%; }
    30% { transform: translateY(-8px) scale(1.02); border-radius: 50% 50% 50% 50% / 44% 44% 56% 56%; }
    60% { transform: translateY(-4px) scale(1.01); border-radius: 48% 52% 52% 48% / 42% 42% 58% 58%; }
  }

  .login-title { text-align: center; }
  .login-title h1 { font-size: 2.2rem; font-weight: 300; letter-spacing: -0.8px; color: var(--text); }
  .login-title p { color: var(--muted); font-size: 0.82rem; margin-top: 0.3rem; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.3px; }

  .login-box {
    background: rgba(17,24,16,0.8);
    border: 1px solid var(--border2);
    border-radius: 24px;
    padding: 2rem;
    width: 100%;
    max-width: 360px;
    display: flex;
    flex-direction: column;
    gap: 0.875rem;
    backdrop-filter: blur(20px);
    box-shadow: 0 24px 80px rgba(0,0,0,0.4), 0 0 0 1px rgba(107,143,78,0.05);
  }

  .login-box > p { font-size: 0.8rem; color: var(--muted); text-align: center; line-height: 1.6; }

  .btn-google {
    display: flex; align-items: center; justify-content: center; gap: 0.75rem;
    background: linear-gradient(160deg, #1e2e18, #152010);
    border: 1px solid var(--border2);
    border-radius: 14px; padding: 0.875rem 1.25rem;
    color: var(--text2); font-family: 'Inter', sans-serif; font-size: 0.875rem; font-weight: 500;
    cursor: pointer; transition: all 0.2s; text-decoration: none;
  }
  .btn-google:hover { background: linear-gradient(160deg, #243820, #1a2a14); border-color: var(--accent); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(107,143,78,0.12); }

  .divider { display: flex; align-items: center; gap: 0.75rem; color: var(--muted); font-size: 0.7rem; font-family: 'JetBrains Mono', monospace; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .btn-skip { background: none; border: 1px solid var(--border); border-radius: 14px; padding: 0.75rem 1.25rem; color: var(--muted); font-family: 'Inter', sans-serif; font-size: 0.82rem; cursor: pointer; transition: all 0.15s; }
  .btn-skip:hover { color: var(--text); border-color: var(--border2); }

  /* APP */
  #app { display: none; flex-direction: column; height: 100dvh; position: relative; z-index: 1; }

  /* HEADER */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.75rem 1.5rem;
    border-bottom: 1px solid var(--border);
    background: rgba(10,15,10,0.85);
    backdrop-filter: blur(20px);
    flex-shrink: 0;
  }

  .header-left { display: flex; align-items: center; gap: 0.75rem; }

  .header-drop {
    width: 30px; height: 30px;
    background: radial-gradient(ellipse at 35% 30%, #a8d080, #5a7a40 50%, #1a3010);
    border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
    box-shadow: 0 4px 12px rgba(107,143,78,0.2), inset 0 1px 3px rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; color: rgba(255,255,255,0.85);
    font-weight: 500;
  }

  .header-name { font-size: 0.95rem; font-weight: 500; letter-spacing: -0.2px; color: var(--text); }
  .status-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent2); box-shadow: 0 0 6px var(--accent2); animation: pulse 2.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .header-right { display: flex; align-items: center; gap: 0.375rem; }

  .user-badge { display: flex; align-items: center; gap: 0.4rem; background: var(--surface); border: 1px solid var(--border2); border-radius: 8px; padding: 0.28rem 0.6rem; font-size: 0.7rem; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
  .user-badge .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent2); }

  .btn-icon { background: none; border: 1px solid var(--border); border-radius: 8px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; color: var(--muted); cursor: pointer; transition: all 0.15s; font-size: 0.9rem; }
  .btn-icon:hover { color: var(--text); border-color: var(--border2); background: var(--surface); }
  .btn-icon.active { color: var(--accent2); border-color: var(--accent); background: var(--accent-glow); }

  /* QUICK ACTIONS */
  .quick-actions { display: flex; gap: 0.375rem; padding: 0.6rem 1.5rem; overflow-x: auto; scrollbar-width: none; flex-shrink: 0; border-bottom: 1px solid var(--border); }
  .quick-actions::-webkit-scrollbar { display: none; }
  .chip { display: flex; align-items: center; gap: 0.3rem; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 0.3rem 0.7rem; font-size: 0.7rem; color: var(--muted); cursor: pointer; white-space: nowrap; transition: all 0.15s; flex-shrink: 0; }
  .chip:hover { color: var(--text2); border-color: var(--accent); background: var(--accent-glow); }

  /* MESSAGES - Claude-style */
  #messages { flex: 1; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }

  .msg-wrapper {
    padding: 1.5rem 1.5rem;
    border-bottom: 1px solid rgba(31,43,26,0.5);
    transition: background 0.1s;
  }
  .msg-wrapper:last-child { border-bottom: none; }
  .msg-wrapper.user { background: var(--user-bg); }
  .msg-wrapper.ai { background: transparent; }
  .msg-wrapper:hover { background: rgba(17,24,16,0.5); }
  .msg-wrapper.user:hover { background: rgba(13,26,10,0.8); }

  .msg-inner { max-width: 740px; margin: 0 auto; display: flex; gap: 1rem; align-items: flex-start; }

  .msg-avatar {
    width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 0.65rem; font-weight: 600; margin-top: 2px;
  }
  .msg-avatar.user-av { background: linear-gradient(135deg, #1a3a2a, #2a5a3a); border: 1px solid #2a4a32; color: var(--accent2); font-family: 'JetBrains Mono', monospace; }
  .msg-avatar.ai-av {
    background: radial-gradient(ellipse at 35% 30%, #8fb870, #4a6a30 50%, #1a3010);
    border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
    box-shadow: 0 2px 8px rgba(107,143,78,0.2);
    color: rgba(255,255,255,0.9);
    font-family: 'JetBrains Mono', monospace;
  }

  .msg-content { flex: 1; min-width: 0; }

  .msg-role { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.3px; margin-bottom: 0.5rem; }
  .msg-role.user-role { color: var(--accent2); }
  .msg-role.ai-role { color: var(--accent-light); }

  .msg-text { font-size: 0.9rem; line-height: 1.75; color: var(--text2); }
  .msg-text strong { color: var(--text); font-weight: 600; }
  .msg-text em { color: var(--accent-light); font-style: italic; }
  .msg-text p { margin-bottom: 0.75rem; }
  .msg-text p:last-child { margin-bottom: 0; }
  .msg-text ul, .msg-text ol { margin: 0.5rem 0 0.75rem 1.25rem; }
  .msg-text li { margin-bottom: 0.3rem; }
  .msg-text h1, .msg-text h2, .msg-text h3 { color: var(--text); font-weight: 600; margin: 1rem 0 0.5rem; }
  .msg-text h1 { font-size: 1.2rem; } .msg-text h2 { font-size: 1.05rem; } .msg-text h3 { font-size: 0.95rem; }

  /* Code blocks */
  .msg-text pre { background: #0d1a0a; border: 1px solid var(--border2); border-radius: 10px; padding: 1rem; overflow-x: auto; margin: 0.75rem 0; font-size: 0.8rem; line-height: 1.5; position: relative; }
  .msg-text code:not(pre code) { background: rgba(107,143,78,0.1); border: 1px solid var(--border2); border-radius: 4px; padding: 0.1em 0.4em; font-size: 0.82em; font-family: 'JetBrains Mono', monospace; color: var(--accent-light); }
  .msg-text pre code { background: none; border: none; padding: 0; color: var(--text2); }

  /* Copy button */
  .copy-btn {
    position: absolute; top: 0.5rem; right: 0.5rem;
    background: var(--surface2); border: 1px solid var(--border2); border-radius: 6px;
    padding: 0.2rem 0.5rem; font-size: 0.65rem; color: var(--muted); cursor: pointer;
    font-family: 'JetBrains Mono', monospace; transition: all 0.15s; opacity: 0;
  }
  .msg-text pre:hover .copy-btn { opacity: 1; }
  .copy-btn:hover { color: var(--text); border-color: var(--accent); background: var(--accent-glow); }
  .copy-btn.copied { color: var(--accent2); border-color: var(--accent); }

  /* Message copy button */
  .msg-actions { display: flex; gap: 0.4rem; margin-top: 0.75rem; opacity: 0; transition: opacity 0.15s; }
  .msg-wrapper:hover .msg-actions { opacity: 1; }
  .msg-action-btn { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 0.2rem 0.5rem; font-size: 0.65rem; color: var(--muted); cursor: pointer; font-family: 'JetBrains Mono', monospace; transition: all 0.15s; display: flex; align-items: center; gap: 0.3rem; }
  .msg-action-btn:hover { color: var(--text); border-color: var(--border2); background: var(--surface); }

  /* MSG image */
  .msg-image { max-width: 300px; border-radius: 12px; border: 1px solid var(--border2); margin-bottom: 0.75rem; display: block; }

  /* TYPING */
  .typing-indicator { display: flex; align-items: center; gap: 5px; padding: 0.5rem 0; }
  .typing-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--muted); animation: bounce 1.4s infinite; }
  .typing-dot:nth-child(2){animation-delay:0.2s} .typing-dot:nth-child(3){animation-delay:0.4s}
  @keyframes bounce { 0%,60%,100%{transform:translateY(0);opacity:0.4} 30%{transform:translateY(-5px);opacity:1;background:var(--accent2)} }

  /* WELCOME */
  .welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 1rem; padding: 3rem 2rem; text-align: center; min-height: 200px; }
  .welcome-drop { width: 64px; height: 64px; background: radial-gradient(ellipse at 35% 30%, #c8e8a0, #5a7a40 50%, #1a3010); border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%; box-shadow: 0 12px 40px rgba(107,143,78,0.2), inset 0 2px 6px rgba(255,255,255,0.12); animation: dropFloat 4s ease-in-out infinite; }
  .welcome h2 { font-size: 1.4rem; font-weight: 300; letter-spacing: -0.3px; color: var(--text); }
  .welcome p { font-size: 0.8rem; color: var(--muted); max-width: 300px; line-height: 1.7; }

  /* INPUT */
  .input-area { padding: 1rem 1.5rem 1.25rem; border-top: 1px solid var(--border); background: rgba(10,15,10,0.9); backdrop-filter: blur(20px); flex-shrink: 0; }

  .input-container { max-width: 740px; margin: 0 auto; }

  #image-preview-container { display: none; margin-bottom: 0.5rem; position: relative; display: inline-block; }
  #image-preview { max-height: 70px; border-radius: 8px; border: 1px solid var(--border2); display: block; }
  #remove-image { position: absolute; top: -6px; right: -6px; background: var(--red); border: none; border-radius: 50%; width: 18px; height: 18px; color: white; font-size: 0.6rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }

  .input-box {
    display: flex; align-items: flex-end; gap: 0.5rem;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 16px;
    padding: 0.625rem 0.625rem 0.625rem 1rem;
    transition: border-color 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  }
  .input-box:focus-within { border-color: var(--accent); box-shadow: 0 4px 24px rgba(107,143,78,0.08), 0 0 0 3px rgba(107,143,78,0.06); }

  #input { flex: 1; background: none; border: none; outline: none; color: var(--text); font-family: 'Inter', sans-serif; font-size: 0.875rem; resize: none; max-height: 200px; line-height: 1.6; padding: 0.2rem 0; }
  #input::placeholder { color: var(--muted); }

  .input-actions { display: flex; gap: 0.3rem; align-items: center; }

  .btn-mic, .btn-img-up {
    background: none; border: 1px solid var(--border); border-radius: 8px;
    width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--muted); transition: all 0.15s; font-size: 0.85rem; flex-shrink: 0;
  }
  .btn-mic:hover, .btn-img-up:hover { color: var(--text2); border-color: var(--border2); background: var(--surface2); }
  .btn-mic.recording { color: var(--red); border-color: var(--red); background: rgba(232,112,112,0.08); animation: micPulse 1s infinite; }
  @keyframes micPulse { 0%,100%{box-shadow:0 0 0 0 rgba(232,112,112,0.3)} 50%{box-shadow:0 0 0 5px rgba(232,112,112,0)} }

  .btn-send {
    background: radial-gradient(ellipse at 40% 35%, #8fb870, #4a6a30 60%, #2a4a1a);
    border: none; border-radius: 10px; width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: rgba(255,255,255,0.9); transition: all 0.15s; flex-shrink: 0;
    box-shadow: 0 4px 12px rgba(107,143,78,0.25), inset 0 1px 2px rgba(255,255,255,0.1);
  }
  .btn-send:hover { transform: scale(1.05); box-shadow: 0 6px 18px rgba(107,143,78,0.35); }
  .btn-send:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  .input-hint { font-size: 0.62rem; color: var(--muted); text-align: center; margin-top: 0.5rem; font-family: 'JetBrains Mono', monospace; }

  /* ACTION CARDS */
  .action-card-wrap { padding: 0 1.5rem; margin: 0.5rem 0; }
  .action-card { border-radius: 14px; padding: 1rem 1.125rem; max-width: 740px; margin: 0 auto; }
  .action-card.email-card, .action-card.reply-card { border: 1px solid var(--accent); background: rgba(107,143,78,0.04); }
  .action-card.event-card { border: 1px solid #5b8fd4; background: rgba(91,143,212,0.04); }
  .action-card.delete-card { border: 1px solid var(--red); background: rgba(232,112,112,0.04); }
  .action-label { font-size: 0.62rem; color: var(--muted); margin-bottom: 0.6rem; font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: 0.5px; }
  .action-field { font-size: 0.82rem; color: var(--text2); margin-bottom: 0.25rem; }
  .action-field strong { color: var(--accent-light); font-weight: 500; }
  .action-card.event-card .action-field strong { color: #8ab4e8; }
  .action-card.delete-card .action-field strong { color: var(--red); }
  .action-body { font-size: 0.75rem; color: var(--muted); margin: 0.5rem 0 0; white-space: pre-wrap; line-height: 1.6; font-family: 'JetBrains Mono', monospace; padding: 0.5rem; background: var(--surface); border-radius: 8px; border: 1px solid var(--border); }
  .action-btns { display: flex; gap: 0.4rem; margin-top: 0.75rem; }
  .btn-confirm { border: none; border-radius: 8px; padding: 0.4rem 0.875rem; font-weight: 500; cursor: pointer; font-size: 0.78rem; font-family: 'Inter', sans-serif; transition: all 0.15s; }
  .btn-confirm.kaki { background: var(--accent); color: rgba(255,255,255,0.9); }
  .btn-confirm.kaki:hover { background: var(--accent2); }
  .btn-confirm.blue { background: var(--blue); color: white; }
  .btn-confirm.blue:hover { filter: brightness(1.1); }
  .btn-confirm.danger { background: var(--red); color: white; }
  .btn-confirm.danger:hover { filter: brightness(1.1); }
  .btn-cancel-card { background: none; border: 1px solid var(--border2); border-radius: 8px; padding: 0.4rem 0.875rem; color: var(--muted); cursor: pointer; font-size: 0.78rem; font-family: 'Inter', sans-serif; transition: all 0.15s; }
  .btn-cancel-card:hover { color: var(--text); }

  /* SCROLLBAR */
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* MathJax overrides */
  mjx-container { color: var(--accent-light) !important; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-orb">
    <div class="orb-drop"></div>
    <div class="orb-reflection"></div>
  </div>
  <div class="login-title"><h1>Nexus</h1><p>// assistant_ia_personnel</p></div>
  <div class="login-box">
    <p>Connecte ton compte Google pour acceder a tes emails et ton agenda.</p>
    <a class="btn-google" href="/auth">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2.01c-.72.48-1.63.77-2.7.77-2.08 0-3.84-1.4-4.47-3.28H1.83v2.07A8 8 0 0 0 8.98 17z"/><path fill="#FBBC05" d="M4.51 10.54A4.8 4.8 0 0 1 4.26 9c0-.53.09-1.05.25-1.54V5.39H1.83A8 8 0 0 0 .98 9c0 1.29.31 2.51.85 3.61l2.68-2.07z"/><path fill="#EA4335" d="M8.98 3.58c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 .98 9l2.83 2.17C4.14 9 6.43 3.58 8.98 3.58z"/></svg>
      Continuer avec Google
    </a>
    <div class="divider">ou</div>
    <button class="btn-skip" onclick="startWithoutGoogle()">Utiliser sans Gmail / Agenda</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div class="header-left">
      <div class="header-drop">Nx</div>
      <span class="header-name">Nexus</span>
      <div class="status-dot"></div>
    </div>
    <div class="header-right">
      <div class="user-badge" id="user-badge" style="display:none"><div class="dot"></div><span>Google</span></div>
      <button class="btn-icon" id="btn-voice" title="Voix" onclick="toggleVoice()">🔈</button>
      <button class="btn-icon" onclick="logout()" title="Deconnexion">↩</button>
    </div>
  </header>

  <div class="quick-actions">
    <button class="chip" onclick="quickAsk('Resume mes 5 derniers emails')">📧 emails</button>
    <button class="chip" onclick="quickAsk('Quels sont mes rendez-vous aujourd\'hui ?')">📅 agenda</button>
    <button class="chip" onclick="quickAsk('Y a-t-il des emails urgents ?')">⚡ urgent</button>
    <button class="chip" onclick="quickAsk('Qu\'est-ce que j\'ai de prevu cette semaine ?')">🗓️ semaine</button>
    <button class="chip" onclick="quickAsk('Quels emails sont non lus ?')">🔔 non lus</button>
    <button class="chip" onclick="quickAsk('Donne-moi mon briefing du matin')">☀️ briefing</button>
  </div>

  <div id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-drop"></div>
      <h2>Bonjour, je suis Nexus</h2>
      <p id="welcome-sub">Pose-moi n'importe quelle question, envoie une image ou parle-moi.</p>
    </div>
  </div>

  <div class="input-area">
    <div class="input-container">
      <div id="image-preview-container" style="display:none">
        <img id="image-preview" src="" alt=""/>
        <button id="remove-image" onclick="removeImage()">✕</button>
      </div>
      <div class="input-box">
        <textarea id="input" placeholder="Parle a Nexus..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <div class="input-actions">
          <input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleImageUpload(event)">
          <button class="btn-img-up" onclick="document.getElementById('file-input').click()" title="Image">🖼️</button>
          <button class="btn-mic" id="btn-mic" onclick="toggleMic()" title="Parler">🎤</button>
          <button class="btn-send" id="btn-send" onclick="sendMessage()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
      <div class="input-hint">↵ envoyer · ⇧↵ nouvelle ligne · 🎤 parler · 🖼️ image</div>
    </div>
  </div>
</div>

<script>
let messages = [], accessToken = null, voiceEnabled = false, hasGoogle = false, currentImage = null, recognition = null, isRecording = false;

// ── INIT ──
function init() {
  const params = new URLSearchParams(window.location.search);
  const token = params.get('access_token'), refresh = params.get('refresh_token');
  if (token) {
    accessToken = token; hasGoogle = true;
    if (refresh) localStorage.setItem('nexus_refresh', refresh);
    localStorage.setItem('nexus_token', token);
    localStorage.setItem('nexus_token_time', Date.now().toString());
    window.history.replaceState({}, '', '/');
    showApp(true);
  } else {
    const saved = localStorage.getItem('nexus_token');
    const age = Date.now() - parseInt(localStorage.getItem('nexus_token_time') || '0');
    if (saved && age < 55*60*1000) { accessToken = saved; hasGoogle = true; showApp(true); }
    else if (localStorage.getItem('nexus_refresh')) { refreshAccessToken(); }
    else { document.getElementById('login-screen').style.display = 'flex'; }
  }
}

async function refreshAccessToken() {
  const rt = localStorage.getItem('nexus_refresh');
  if (!rt) { document.getElementById('login-screen').style.display = 'flex'; return; }
  try {
    const res = await fetch('/api/refresh', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({refresh_token: rt}) });
    const data = await res.json();
    if (data.access_token) { accessToken = data.access_token; hasGoogle = true; localStorage.setItem('nexus_token', accessToken); localStorage.setItem('nexus_token_time', Date.now().toString()); showApp(true); }
    else { localStorage.clear(); document.getElementById('login-screen').style.display = 'flex'; }
  } catch(e) { document.getElementById('login-screen').style.display = 'flex'; }
}

setInterval(async () => {
  const rt = localStorage.getItem('nexus_refresh'); if (!rt) return;
  const age = Date.now() - parseInt(localStorage.getItem('nexus_token_time') || '0');
  if (age > 50*60*1000) await refreshAccessToken();
}, 60000);

function showApp(withGoogle) {
  if (withGoogle && accessToken) { localStorage.setItem('nexus_token', accessToken); document.getElementById('user-badge').style.display = 'flex'; document.getElementById('welcome-sub').textContent = 'Gmail et Agenda connectes. Pose-moi n\'importe quelle question !'; hasGoogle = true; }
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('input').focus();
  startChecks();
}
function startWithoutGoogle() { showApp(false); }
function logout() { localStorage.clear(); accessToken = null; hasGoogle = false; messages = []; document.getElementById('login-screen').style.display = 'flex'; document.getElementById('app').style.display = 'none'; }

// ── IMAGE ──
function handleImageUpload(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => { currentImage = ev.target.result; document.getElementById('image-preview').src = currentImage; document.getElementById('image-preview-container').style.display = 'block'; };
  reader.readAsDataURL(file);
}
function removeImage() { currentImage = null; document.getElementById('image-preview-container').style.display = 'none'; document.getElementById('file-input').value = ''; }

// ── MIC ──
function toggleMic() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) { addMessage('ai','La reconnaissance vocale n\'est pas supportee sur ce navigateur.'); return; }
  if (isRecording) { recognition && recognition.stop(); return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR(); recognition.lang = 'fr-FR'; recognition.continuous = false; recognition.interimResults = false;
  recognition.onstart = () => { isRecording = true; document.getElementById('btn-mic').classList.add('recording'); };
  recognition.onresult = (e) => { const t = e.results[0][0].transcript; document.getElementById('input').value = t; autoResize(document.getElementById('input')); sendMessage(); };
  recognition.onend = () => { isRecording = false; document.getElementById('btn-mic').classList.remove('recording'); };
  recognition.onerror = () => { isRecording = false; document.getElementById('btn-mic').classList.remove('recording'); };
  recognition.start();
}

// ── VOICE OUTPUT ──
function toggleVoice() {
  voiceEnabled = !voiceEnabled;
  const btn = document.getElementById('btn-voice');
  btn.classList.toggle('active', voiceEnabled);
  btn.textContent = voiceEnabled ? '🔊' : '🔈';
  if (voiceEnabled) speak('Voix activee.');
}

function speak(text) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const clean = text.replace(/\*\*/g,'').replace(/<[^>]*>/g,'').replace(/\$[^$]*\$/g,'expression mathematique').replace(/#{1,6}\s/g,'').replace(/`[^`]*`/g,'');
  const utt = new SpeechSynthesisUtterance(clean);
  utt.lang = 'fr-FR'; utt.rate = 0.95; utt.pitch = 0.95;
  // Try to find best French voice
  const voices = window.speechSynthesis.getVoices();
  const preferredVoice = voices.find(v => v.name.includes('Thomas') || v.name.includes('Amelie') || v.name.includes('French')) || voices.find(v => v.lang.startsWith('fr'));
  if (preferredVoice) utt.voice = preferredVoice;
  window.speechSynthesis.speak(utt);
}

// Load voices when ready
if ('speechSynthesis' in window) window.speechSynthesis.onvoiceschanged = () => {};

// ── MARKDOWN RENDERER ──
function renderMarkdown(text) {
  let html = text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    // Restore math (protect from escaping)
    .replace(/\\\(/g,'INLINEMATH_OPEN').replace(/\\\)/g,'INLINEMATH_CLOSE')
    .replace(/\\\[/g,'DISPLAYMATH_OPEN').replace(/\\\]/g,'DISPLAYMATH_CLOSE');

  // Code blocks
  html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    return `<pre><button class="copy-btn" onclick="copyCode(this)">copier</button><code class="language-${lang}">${code.trim()}</code></pre>`;
  });

  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

  // Headers
  html = html.replace(/^### (.*$)/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.*$)/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.*$)/gm, '<h1>$1</h1>');

  // Bold & italic
  html = html.replace(/\*\*\*(.*?)\*\*\*/g, '<strong><em>$1</em></strong>');
  html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');

  // Lists
  html = html.replace(/^\s*[-*+]\s+(.*)/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>');
  html = html.replace(/^\s*\d+\.\s+(.*)/gm, '<li>$1</li>');

  // Line breaks & paragraphs
  html = html.replace(/\n\n/g, '</p><p>');
  html = html.replace(/\n/g, '<br>');
  html = '<p>' + html + '</p>';

  // Restore math
  html = html.replace(/INLINEMATH_OPEN/g,'\\(').replace(/INLINEMATH_CLOSE/g,'\\)');
  html = html.replace(/DISPLAYMATH_OPEN/g,'\\[').replace(/DISPLAYMATH_CLOSE/g,'\\]');

  // Dollar math
  html = html.replace(/\$\$([\s\S]*?)\$\$/g, '\\[$1\\]');
  html = html.replace(/\$([^\n$]+?)\$/g, '\\($1\\)');

  return html;
}

function copyCode(btn) {
  const code = btn.nextElementSibling.textContent;
  navigator.clipboard.writeText(code).then(() => { btn.textContent = 'copie !'; btn.classList.add('copied'); setTimeout(() => { btn.textContent = 'copier'; btn.classList.remove('copied'); }, 2000); });
}

// ── MESSAGES ──
function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 200) + 'px'; }
function quickAsk(text) { document.getElementById('input').value = text; sendMessage(); }

function addMessage(role, text, imageData) {
  const welcome = document.getElementById('welcome'); if (welcome) welcome.remove();
  const container = document.getElementById('messages');

  const wrapper = document.createElement('div');
  wrapper.className = 'msg-wrapper ' + role;

  const inner = document.createElement('div');
  inner.className = 'msg-inner';

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar ' + (role === 'user' ? 'user-av' : 'ai-av');
  avatar.textContent = role === 'user' ? 'PA' : 'Nx';

  const content = document.createElement('div');
  content.className = 'msg-content';

  const roleLabel = document.createElement('div');
  roleLabel.className = 'msg-role ' + (role === 'user' ? 'user-role' : 'ai-role');
  roleLabel.textContent = role === 'user' ? 'Toi' : 'Nexus';

  const msgText = document.createElement('div');
  msgText.className = 'msg-text';

  if (imageData) {
    const img = document.createElement('img');
    img.src = imageData; img.className = 'msg-image';
    msgText.appendChild(img);
  }

  const textDiv = document.createElement('div');
  if (role === 'ai') {
    textDiv.innerHTML = renderMarkdown(text);
    // Highlight code
    setTimeout(() => { textDiv.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el)); }, 10);
    // Render MathJax
    if (window.MathJax) setTimeout(() => MathJax.typesetPromise([textDiv]).catch(()=>{}), 50);
  } else {
    textDiv.textContent = text;
  }
  msgText.appendChild(textDiv);

  // Copy message button
  const actions = document.createElement('div');
  actions.className = 'msg-actions';
  const copyMsgBtn = document.createElement('button');
  copyMsgBtn.className = 'msg-action-btn';
  copyMsgBtn.innerHTML = '📋 copier';
  copyMsgBtn.onclick = () => {
    navigator.clipboard.writeText(text).then(() => { copyMsgBtn.innerHTML = '✓ copie'; setTimeout(() => { copyMsgBtn.innerHTML = '📋 copier'; }, 2000); });
  };
  actions.appendChild(copyMsgBtn);

  content.appendChild(roleLabel);
  content.appendChild(msgText);
  content.appendChild(actions);
  inner.appendChild(avatar);
  inner.appendChild(content);
  wrapper.appendChild(inner);
  container.appendChild(wrapper);
  container.scrollTop = container.scrollHeight;
  return wrapper;
}

function addTyping() {
  const container = document.getElementById('messages');
  const wrapper = document.createElement('div'); wrapper.className = 'msg-wrapper ai'; wrapper.id = 'typing-wrapper';
  const inner = document.createElement('div'); inner.className = 'msg-inner';
  const avatar = document.createElement('div'); avatar.className = 'msg-avatar ai-av'; avatar.textContent = 'Nx';
  const content = document.createElement('div'); content.className = 'msg-content';
  const roleLabel = document.createElement('div'); roleLabel.className = 'msg-role ai-role'; roleLabel.textContent = 'Nexus';
  const typing = document.createElement('div'); typing.className = 'typing-indicator';
  typing.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
  content.appendChild(roleLabel); content.appendChild(typing);
  inner.appendChild(avatar); inner.appendChild(content); wrapper.appendChild(inner);
  container.appendChild(wrapper); container.scrollTop = container.scrollHeight;
}
function removeTyping() { const t = document.getElementById('typing-wrapper'); if (t) t.remove(); }

// ── SEND ──
async function sendMessage() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text && !currentImage) return;
  const imageToSend = currentImage;
  input.value = ''; input.style.height = 'auto';
  document.getElementById('btn-send').disabled = true;
  removeImage();
  addMessage('user', text || 'Image envoyee', imageToSend);

  let userContent;
  if (imageToSend) {
    const base64 = imageToSend.split(',')[1];
    const mimeType = imageToSend.split(';')[0].split(':')[1];
    userContent = [{ type:'image_url', image_url:{ url:`data:${mimeType};base64,${base64}` } }, { type:'text', text: text || 'Decris et analyse cette image.' }];
  } else { userContent = text; }

  messages.push({ role:'user', content: userContent });
  addTyping();

  try {
    const body = { messages };
    if (hasGoogle && accessToken) body.accessToken = accessToken;
    const res = await fetch('/api/chat', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
    const data = await res.json();
    removeTyping();
    const reply = data.content?.[0]?.text || "Je n'ai pas pu traiter ta demande.";
    messages.push({ role:'assistant', content: reply });

    const deleteMatch = reply.match(/DELETE_EVENT\[eventId:(.*?)\|summary:(.*?)\]/s);
    const eventMatch = reply.match(/CREATE_EVENT\[summary:(.*?)\|start:(.*?)\|end:(.*?)(?:\|location:(.*?))?(?:\|description:(.*?))?\]/s);
    const emailMatch = reply.match(/SEND_EMAIL\[to:(.*?)\|subject:(.*?)\|body:(.*?)\]/s);
    const replyMatch = reply.match(/REPLY_EMAIL\[to:(.*?)\|subject:(.*?)\|body:(.*?)\|threadId:(.*?)\]/s);
    const memoryMatch = reply.match(/SAVE_MEMORY\[(.*?)\]/s);

    if (memoryMatch) {
      const pairs = memoryMatch[1].split('|'); const md = {};
      pairs.forEach(p => { const [k,...v] = p.split(':'); if(k&&v.length) md[k.trim()]=v.join(':').trim(); });
      fetch('/api/memory', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(md) });
    }

    const cleanReply = reply.replace(/DELETE_EVENT\[.*?\]/s,'').replace(/CREATE_EVENT\[.*?\]/s,'').replace(/SEND_EMAIL\[.*?\]/s,'').replace(/REPLY_EMAIL\[.*?\]/s,'').replace(/SAVE_MEMORY\[.*?\]/s,'').trim();

    if (deleteMatch && hasGoogle) { showActionCard('delete',{eventId:deleteMatch[1].trim(),summary:deleteMatch[2].trim()}); addMessage('ai', cleanReply || 'Je vais supprimer cet evenement. Confirme ci-dessous.'); }
    else if (eventMatch && hasGoogle) { showActionCard('event',{summary:eventMatch[1].trim(),start:eventMatch[2].trim(),end:eventMatch[3].trim(),location:eventMatch[4]?.trim()||''}); addMessage('ai', cleanReply || 'Je vais creer cet evenement. Confirme ci-dessous.'); }
    else if (emailMatch && hasGoogle) { showActionCard('email',{to:emailMatch[1].trim(),subject:emailMatch[2].trim(),body:emailMatch[3].trim()}); addMessage('ai', cleanReply || 'Je vais envoyer cet email. Confirme ci-dessous.'); }
    else if (replyMatch && hasGoogle) { showActionCard('reply',{to:replyMatch[1].trim(),subject:replyMatch[2].trim(),body:replyMatch[3].trim(),threadId:replyMatch[4].trim()}); addMessage('ai', cleanReply || 'Je vais repondre a cet email. Confirme ci-dessous.'); }
    else { addMessage('ai', cleanReply || reply); }

    if (voiceEnabled) speak(cleanReply || reply);
  } catch(e) { removeTyping(); addMessage('ai','Erreur de connexion. Verifie ta connexion internet.'); }

  document.getElementById('btn-send').disabled = false;
  document.getElementById('input').focus();
}

// ── ACTION CARDS ──
function showActionCard(type, data) {
  const existing = document.getElementById('action-card-wrap'); if (existing) existing.remove();
  const wrap = document.createElement('div'); wrap.id = 'action-card-wrap'; wrap.className = 'action-card-wrap';
  const div = document.createElement('div'); div.className = 'action-card ' + type + '-card';
  const label = document.createElement('div'); label.className = 'action-label';
  const labels = {email:'✉️ email a envoyer', reply:'↩️ reponse a envoyer', event:'📅 evenement a creer', delete:'🗑️ evenement a supprimer'};
  label.textContent = labels[type]; div.appendChild(label);

  function af(l, v) { const d = document.createElement('div'); d.className = 'action-field'; d.innerHTML = '<strong>'+l+' :</strong> '+v; div.appendChild(d); }

  if (type==='email'||type==='reply') {
    af('A', data.to); af('Objet', type==='reply'?'Re: '+data.subject:data.subject);
    const bd = document.createElement('div'); bd.className='action-body'; bd.textContent=data.body; div.appendChild(bd);
  } else if (type==='event') {
    af('Titre', data.summary);
    const s = new Date(data.start).toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',hour:'2-digit',minute:'2-digit',timeZone:'Europe/Brussels'});
    const e = new Date(data.end).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/Brussels'});
    af('Quand', s+' → '+e);
    if (data.location) af('Lieu', data.location);
  } else if (type==='delete') { af('Titre', data.summary); }

  const btns = document.createElement('div'); btns.className='action-btns';
  const bc = document.createElement('button'); bc.className='btn-confirm '+(type==='delete'?'danger':type==='event'?'blue':'kaki');
  const bl = {email:'✉️ Envoyer', reply:'↩️ Repondre', event:'📅 Creer', delete:'🗑️ Supprimer'};
  bc.textContent = bl[type]; bc.addEventListener('click', ()=>executeAction(type,data));
  const bx = document.createElement('button'); bx.className='btn-cancel-card'; bx.textContent='Annuler'; bx.addEventListener('click',()=>wrap.remove());
  btns.appendChild(bc); btns.appendChild(bx); div.appendChild(btns);
  wrap.appendChild(div);
  document.getElementById('messages').appendChild(wrap);
  document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
}

async function executeAction(type, data) {
  const wrap = document.getElementById('action-card-wrap'); if (wrap) wrap.remove();
  addTyping();
  try {
    const eps = {email:'/api/send-email', reply:'/api/reply-email', event:'/api/create-event', delete:'/api/delete-event'};
    const body = type==='delete' ? {accessToken, eventId:data.eventId} : {accessToken, ...data};
    const res = await fetch(eps[type], {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
    const result = await res.json(); removeTyping();
    const msgs = {email:'Email envoye a '+data.to, reply:'Reponse envoyee a '+data.to, event:'Evenement cree : '+data.summary, delete:'Evenement supprime : '+data.summary};
    addMessage('ai', result.success ? '✅ **'+msgs[type]+'** !' : '❌ Erreur : '+result.error);
  } catch(e) { removeTyping(); addMessage('ai','Erreur de connexion.'); }
}

// ── NOTIFICATIONS ──
async function requestNotificationPermission() { if ('Notification' in window && Notification.permission === 'default') await Notification.requestPermission(); }
function sendNotification(title, body) { if (Notification.permission !== 'granted') return; const n = new Notification(title,{body}); n.onclick=()=>window.focus(); }

let lastEmailCount = 0;
async function checkNewEmails() {
  if (!hasGoogle||!accessToken) return;
  try {
    const res = await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({accessToken,messages:[{role:'user',content:'Combien ai-je d emails non lus ? Reponds uniquement avec un nombre entier.'}]})});
    const data = await res.json();
    const count = parseInt(data.content?.[0]?.text?.match(/\d+/)?.[0]||'0');
    if (count > lastEmailCount && lastEmailCount !== 0) sendNotification('📧 Nouveau message','Tu as '+count+' emails non lus');
    lastEmailCount = count;
  } catch(e){}
}

function checkMorningBriefing() {
  const now = new Date(); const h = now.getHours();
  const last = localStorage.getItem('nexus_last_briefing'); const today = now.toDateString();
  if (h>=7&&h<10&&last!==today&&hasGoogle) {
    localStorage.setItem('nexus_last_briefing',today);
    setTimeout(()=>{ sendNotification('☀️ Bonjour !','Ton briefing Nexus est pret.'); setTimeout(()=>quickAsk('Donne-moi mon briefing du matin : agenda du jour et emails importants'),2000); },3000);
  }
}

function startChecks() { requestNotificationPermission(); checkMorningBriefing(); setInterval(checkNewEmails,5*60*1000); setInterval(checkMorningBriefing,60*1000); }

init();
</script>
