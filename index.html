<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nexus</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#0f0f0f;color:#d4d4d4;height:100vh;display:flex;overflow:hidden}
.sidebar{width:200px;background:#0a0a0a;border-right:1px solid #1e1e1e;display:flex;flex-direction:column;padding:16px 12px;gap:4px;flex-shrink:0}
.brand{display:flex;align-items:center;gap:8px;padding:8px 8px 16px;border-bottom:1px solid #1e1e1e;margin-bottom:8px}
.brand-dot{width:22px;height:22px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center}
.brand-dot svg{width:10px;height:10px}
.brand-name{font-size:14px;font-weight:500;color:#fff;letter-spacing:0.5px}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:6px;cursor:pointer;font-size:12px;color:#555;transition:all .15s;border:none;background:none;width:100%;text-align:left;font-family:'Inter',sans-serif}
.nav-item:hover{background:#1a1a1a;color:#aaa}
.nav-item.active{background:#1e1e1e;color:#fff}
.nav-item svg{width:14px;height:14px;flex-shrink:0}
.sidebar-bottom{margin-top:auto;padding-top:12px;border-top:1px solid #1e1e1e}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{padding:14px 20px;border-bottom:1px solid #1e1e1e;display:flex;align-items:center;justify-content:space-between}
.topbar-title{font-size:13px;font-weight:500;color:#fff}
.topbar-status{display:flex;align-items:center;gap:6px;font-size:11px;color:#555}
.status-dot{width:6px;height:6px;border-radius:50%;background:#22c55e}
.messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.messages::-webkit-scrollbar{width:3px}
.messages::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:2px}
.msg-row{display:flex;gap:10px;align-items:flex-end;animation:fi .25s ease}
.msg-row.user{flex-direction:row-reverse}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.avatar{width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:500}
.avatar.nx{background:#1e1e1e;color:#888;border:1px solid #2a2a2a}
.avatar.me{background:#2a2a2a;color:#aaa}
.bubble{max-width:72%;padding:10px 14px;border-radius:16px;font-size:13px;line-height:1.6}
.bubble.nx{background:#1e1e1e;color:#d4d4d4;border:1px solid #2a2a2a;border-bottom-left-radius:4px}
.bubble.me{background:#fff;color:#141414;border-bottom-right-radius:4px}
.bubble strong{color:#fff}
.bubble.me strong{color:#141414}
.chips{display:flex;gap:6px;padding:0 20px 12px;flex-wrap:wrap}
.chip{font-size:11px;color:#555;border:1px solid #2a2a2a;border-radius:20px;padding:4px 10px;cursor:pointer;transition:all .15s;background:transparent;font-family:'Inter',sans-serif}
.chip:hover{border-color:#444;color:#aaa;background:#1a1a1a}
.input-row{padding:12px 20px 16px;border-top:1px solid #1e1e1e;display:flex;gap:8px;align-items:center}
.inp{flex:1;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:10px 14px;color:#d4d4d4;font-size:13px;font-family:'Inter',sans-serif;outline:none;transition:border-color .15s}
.inp::placeholder{color:#3a3a3a}
.inp:focus{border-color:#3a3a3a}
.btn-send{width:36px;height:36px;border-radius:8px;background:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:opacity .15s;flex-shrink:0}
.btn-send:hover{opacity:.85}
.btn-mic{width:36px;height:36px;border-radius:8px;background:transparent;border:1px solid #2a2a2a;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;color:#555}
.btn-mic:hover{border-color:#444;color:#888}
.btn-mic.on{border-color:#ef4444;color:#ef4444;background:rgba(239,68,68,0.08)}
.typing{display:flex;gap:3px;align-items:center;padding:2px 0}
.typing span{width:5px;height:5px;border-radius:50%;background:#444;animation:t 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes t{0%,100%{opacity:.3}50%{opacity:1}}
</style>
</head>
<body>
<div class="sidebar">
  <div class="brand">
    <div class="brand-dot">
      <svg viewBox="0 0 10 10" fill="none"><circle cx="5" cy="5" r="3" fill="#141414"/><circle cx="5" cy="5" r="1.5" fill="#fff"/></svg>
    </div>
    <span class="brand-name">Nexus</span>
  </div>
  <button class="nav-item active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    Chat
  </button>
  <button class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2-2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
    Emails
  </button>
  <button class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    Agenda
  </button>
  <div class="sidebar-bottom">
    <button class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      Profil
    </button>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <span class="topbar-title">Conversation</span>
    <div class="topbar-status"><div class="status-dot"></div>Gmail · Calendar connectés</div>
  </div>
  <div class="messages" id="msgs">
    <div class="msg-row">
      <div class="avatar nx">NX</div>
      <div class="bubble nx">Bonjour. Je suis <strong>Nexus</strong>, ton assistant personnel. Je suis connecté à ton Gmail et ton Google Calendar. Comment puis-je t'aider ?</div>
    </div>
  </div>
  <div class="chips">
    <button class="chip" onclick="q('Quels sont mes emails non lus ?')">Emails non lus</button>
    <button class="chip" onclick="q('Quels événements ai-je aujourd\'hui ?')">Agenda du jour</button>
    <button class="chip" onclick="q('Résume ma semaine')">Ma semaine</button>
    <button class="chip" onclick="q('Aide-moi à écrire un email')">Rédiger un email</button>
  </div>
  <div class="input-row">
    <input class="inp" id="inp" placeholder="Message..." onkeydown="if(event.key==='Enter')send()"/>
    <button class="btn-mic" id="mic" onclick="toggleMic()" title="Voix">
      <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3zm7 11v1a7 7 0 0 1-14 0v-1H3v1a9 9 0 0 0 8 8.94V22H8v2h8v-2h-3v-1.06A9 9 0 0 0 21 13v-1h-2z"/></svg>
    </button>
    <button class="btn-send" onclick="send()">
      <svg viewBox="0 0 24 24" fill="#141414" width="14" height="14"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </div>
</div>

<script>
let voiceOn=false,speaking=false,history=[];
const msgs=document.getElementById('msgs');
const inp=document.getElementById('inp');

function addMsg(role,html){
  const row=document.createElement('div');
  row.className='msg-row'+(role==='user'?' user':'');
  const av=document.createElement('div');
  av.className='avatar '+(role==='user'?'me':'nx');
  av.textContent=role==='user'?'MOI':'NX';
  const b=document.createElement('div');
  b.className='bubble '+(role==='user'?'me':'nx');
  b.innerHTML=html.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
  row.appendChild(av);row.appendChild(b);
  msgs.appendChild(row);
  msgs.scrollTop=msgs.scrollHeight;
}

function showTyping(){
  const row=document.createElement('div');
  row.className='msg-row';row.id='typ';
  row.innerHTML='<div class="avatar nx">NX</div><div class="bubble nx"><div class="typing"><span></span><span></span><span></span></div></div>';
  msgs.appendChild(row);msgs.scrollTop=msgs.scrollHeight;
}
function removeTyping(){const t=document.getElementById('typ');if(t)t.remove();}

function speak(txt){
  if(!voiceOn)return;
  if(speaking)speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(txt.replace(/<[^>]+>/g,'').replace(/\*\*/g,''));
  u.lang='fr-FR';u.rate=0.95;
  const v=speechSynthesis.getVoices().find(x=>x.lang.startsWith('fr'));
  if(v)u.voice=v;
  speaking=true;u.onend=()=>speaking=false;
  speechSynthesis.speak(u);
}

function toggleMic(){
  voiceOn=!voiceOn;
  document.getElementById('mic').classList.toggle('on',voiceOn);
  if(!voiceOn)speechSynthesis.cancel();
}

async function callNexus(msg){
  history.push({role:'user',content:msg});
  showTyping();
  try{
    const r=await fetch('/.netlify/functions/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages:history})
    });
    const d=await r.json();
    removeTyping();
    const reply=d.content?.[0]?.text
    history.push({role:'assistant',content:reply});
    addMsg('nexus',reply);
    speak(reply);
  }catch(e){
    removeTyping();
    addMsg('nexus',"Une erreur s'est produite. Réessaie.");
  }
}

function q(txt){addMsg('user',txt);callNexus(txt);}
function send(){const v=inp.value.trim();if(!v)return;inp.value='';addMsg('user',v);callNexus(v);}
speechSynthesis.getVoices();
</script>
</body>
</html>
