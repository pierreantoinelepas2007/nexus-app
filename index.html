<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Nexus">
<meta name="theme-color" content="#000000">
<link rel="apple-touch-icon" sizes="180x180" href="/nexus_icon.png">
<link rel="apple-touch-icon" sizes="152x152" href="/nexus_icon.png">
<link rel="apple-touch-icon" sizes="120x120" href="/nexus_icon.png">
<link rel="icon" type="image/png" href="/nexus_icon.png">
<link rel="shortcut icon" href="/nexus_icon.png">
<link rel="manifest" href="/manifest.json">
<style>html{height:-webkit-fill-available}body{min-height:-webkit-fill-available}</style>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#000005;
  --border:rgba(100,180,255,0.08);
  --text:#c8dff0;
  --muted:rgba(120,170,210,0.4);
  --accent:#58b8e8;
  --accent2:#3a9fd0;
  --user-bubble:rgba(58,159,208,0.07);
}
*{-webkit-font-smoothing:antialiased}
body{font-family:'Inter',sans-serif;background:#000005;color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden;position:relative}

/* ══ CANVAS — full screen ══ */
#c{position:fixed;inset:0;z-index:0;width:100%;height:100%}

/* ══ OVERLAY gradient so UI is readable ══ */
#overlay{
  position:fixed;inset:0;z-index:1;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 40% at 50% 50%, transparent 30%, rgba(0,0,5,0.55) 100%),
    linear-gradient(to bottom, rgba(0,0,5,0.7) 0%, transparent 15%, transparent 80%, rgba(0,0,5,0.85) 100%);
}

/* ══ LOGIN ══ */
#login-screen{
  position:relative;z-index:20;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100dvh;gap:1.75rem;padding:2rem;
}
.login-title{text-align:center}
.login-title h1{font-size:2.5rem;font-weight:200;letter-spacing:12px;color:#fff;text-transform:uppercase}
.login-title p{color:var(--muted);font-size:0.7rem;margin-top:0.5rem;font-family:'JetBrains Mono',monospace;letter-spacing:3px}
.login-box{
  background:rgba(0,5,20,0.7);border:1px solid rgba(88,184,232,0.12);
  border-radius:16px;padding:1.75rem;width:100%;max-width:340px;
  display:flex;flex-direction:column;gap:0.875rem;backdrop-filter:blur(30px);
}
.login-box p{font-size:0.8rem;color:var(--muted);text-align:center;line-height:1.7}
.btn-google{
  display:flex;align-items:center;justify-content:center;gap:0.75rem;
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);
  border-radius:10px;padding:0.8rem 1.25rem;
  color:var(--text);font-size:0.85rem;cursor:pointer;transition:all 0.2s;text-decoration:none;
}
.btn-google:hover{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.2)}
.divider{display:flex;align-items:center;gap:0.75rem;color:var(--muted);font-size:0.65rem;font-family:'JetBrains Mono',monospace;letter-spacing:1px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.btn-skip{background:none;border:1px solid var(--border);border-radius:10px;padding:0.75rem 1.25rem;color:var(--muted);font-size:0.8rem;cursor:pointer;transition:all 0.2s}
.btn-skip:hover{color:var(--accent);border-color:rgba(88,184,232,0.2)}

/* ══ APP ══ */
#app{display:none;flex-direction:column;height:100dvh;position:relative;z-index:20}

/* ══ HEADER ══ */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0.875rem 1.5rem;
  background:rgba(0,0,10,0.5);backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(88,184,232,0.06);flex-shrink:0;
}
.header-left{display:flex;align-items:center;gap:0.875rem}
.logo-sm{
  width:28px;height:28px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,rgba(88,184,232,0.2),transparent);
  border:1px solid rgba(88,184,232,0.2);
  display:flex;align-items:center;justify-content:center;
  font-family:'JetBrains Mono',monospace;font-size:0.55rem;color:var(--accent);
}
.header-name{font-size:0.78rem;font-weight:300;letter-spacing:5px;color:rgba(255,255,255,0.5);text-transform:uppercase}
.status-dot{width:4px;height:4px;border-radius:50%;background:var(--accent);box-shadow:0 0 6px var(--accent);animation:pulse 3s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.2}}
.header-right{display:flex;align-items:center;gap:0.4rem}
.user-badge{
  display:flex;align-items:center;gap:0.4rem;
  background:rgba(88,184,232,0.05);border:1px solid rgba(88,184,232,0.1);
  border-radius:20px;padding:0.22rem 0.65rem;
  font-size:0.68rem;color:var(--accent);font-family:'JetBrains Mono',monospace;
}
.btn-icon{
  background:rgba(0,0,10,0.4);border:1px solid rgba(88,184,232,0.08);
  border-radius:7px;width:30px;height:30px;
  display:flex;align-items:center;justify-content:center;
  color:var(--muted);cursor:pointer;transition:all 0.15s;font-size:0.82rem;
  backdrop-filter:blur(10px);
}
.btn-icon:hover{color:var(--accent);border-color:rgba(88,184,232,0.2)}
.btn-icon.active{color:var(--accent);border-color:rgba(88,184,232,0.3);background:rgba(88,184,232,0.06)}

/* ══ QUICK ACTIONS ══ */
.quick-actions{
  display:flex;gap:0.375rem;padding:0.5rem 1.5rem;
  overflow-x:auto;scrollbar-width:none;flex-shrink:0;
  background:rgba(0,0,10,0.35);backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(88,184,232,0.05);
}
.quick-actions::-webkit-scrollbar{display:none}
.chip{
  display:flex;align-items:center;gap:0.3rem;
  background:rgba(88,184,232,0.03);border:1px solid rgba(88,184,232,0.07);
  border-radius:20px;padding:0.25rem 0.65rem;
  font-size:0.65rem;color:var(--muted);font-family:'JetBrains Mono',monospace;
  cursor:pointer;white-space:nowrap;transition:all 0.15s;flex-shrink:0;
}
.chip:hover{color:var(--accent);border-color:rgba(88,184,232,0.2);background:rgba(88,184,232,0.06)}

/* ══ MESSAGES — transparent, over sphere ══ */
#messages{
  flex:1;overflow-y:auto;padding:1.25rem 1.5rem;
  display:flex;flex-direction:column;gap:0.875rem;
  scrollbar-width:thin;scrollbar-color:rgba(88,184,232,0.1) transparent;
}
.msg{display:flex;flex-direction:column;gap:0.18rem;max-width:78%;animation:fadeUp 0.2s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-self:flex-end;align-items:flex-end}
.msg.ai{align-self:flex-start;align-items:flex-start}
.bubble{
  padding:0.65rem 0.9rem;border-radius:14px;
  font-size:0.82rem;line-height:1.75;position:relative;
  backdrop-filter:blur(25px);
}
.msg.user .bubble{
  background:rgba(58,159,208,0.08);
  border:1px solid rgba(88,184,232,0.12);
  border-bottom-right-radius:3px;color:rgba(200,228,248,0.85);
}
.msg.ai .bubble{
  background:rgba(0,5,20,0.55);
  border:1px solid rgba(88,184,232,0.08);
  border-bottom-left-radius:3px;
}
.msg-label{font-size:0.58rem;color:var(--muted);padding:0 0.2rem;font-family:'JetBrains Mono',monospace;letter-spacing:2px;text-transform:uppercase}
.msg-image{max-width:200px;border-radius:8px;border:1px solid var(--border);margin-bottom:0.35rem;display:block}

.copy-msg-btn{position:absolute;top:0.3rem;right:0.3rem;background:rgba(0,0,20,0.8);border:1px solid var(--border);border-radius:4px;padding:0.1rem 0.3rem;font-size:0.56rem;color:var(--muted);cursor:pointer;font-family:'JetBrains Mono',monospace;opacity:0;transition:opacity 0.15s}
.bubble:hover .copy-msg-btn{opacity:1}
.copy-msg-btn.copied{color:var(--accent)}

.bubble strong{color:var(--accent);font-weight:500}
.bubble em{color:rgba(140,200,235,0.8);font-style:italic}
.bubble h1,.bubble h2,.bubble h3{color:var(--text);font-weight:400;margin:0.5rem 0 0.25rem}
.bubble h1{font-size:0.95rem}.bubble h2{font-size:0.88rem}.bubble h3{font-size:0.83rem}
.bubble ul,.bubble ol{margin:0.3rem 0 0.3rem 1rem}
.bubble li{margin-bottom:0.18rem}
.bubble p{margin-bottom:0.4rem}.bubble p:last-child{margin-bottom:0}
.bubble pre{background:rgba(0,5,20,0.85);border:1px solid rgba(88,184,232,0.1);border-radius:8px;padding:0.65rem;overflow-x:auto;margin:0.35rem 0;font-size:0.72rem;line-height:1.5;position:relative}
.bubble pre .copy-code-btn{position:absolute;top:0.3rem;right:0.3rem;background:rgba(88,184,232,0.05);border:1px solid rgba(88,184,232,0.1);border-radius:3px;padding:0.1rem 0.3rem;font-size:0.56rem;color:var(--muted);cursor:pointer;font-family:'JetBrains Mono',monospace;transition:all 0.15s}
.bubble pre .copy-code-btn:hover,.bubble pre .copy-code-btn.copied{color:var(--accent)}
.bubble code:not(pre code){background:rgba(88,184,232,0.07);border:1px solid rgba(88,184,232,0.12);border-radius:3px;padding:0.08em 0.28em;font-size:0.78em;font-family:'JetBrains Mono',monospace;color:var(--accent)}

/* ══ TYPING ══ */
.typing .bubble{display:flex;align-items:center;gap:4px;padding:0.75rem 0.9rem}
.typing-dot{width:4px;height:4px;border-radius:50%;background:var(--accent);opacity:0.3;animation:tdot 1.5s infinite}
.typing-dot:nth-child(2){animation-delay:0.22s}.typing-dot:nth-child(3){animation-delay:0.44s}
@keyframes tdot{0%,60%,100%{transform:scale(1);opacity:0.3}30%{transform:scale(1.5);opacity:1;box-shadow:0 0 5px var(--accent)}}

/* ══ WELCOME ══ */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:0.6rem;padding:2rem;text-align:center;pointer-events:none}
.welcome h2{font-size:0.9rem;font-weight:300;letter-spacing:5px;text-transform:uppercase;color:rgba(255,255,255,0.25)}
.welcome p{font-size:0.65rem;color:rgba(120,170,210,0.25);font-family:'JetBrains Mono',monospace;letter-spacing:2px}

/* ══ INPUT ══ */
.input-area{
  padding:0.75rem 1.5rem 1rem;
  border-top:1px solid rgba(88,184,232,0.06);
  background:rgba(0,0,10,0.6);backdrop-filter:blur(30px);
  flex-shrink:0;
}
#image-preview-container{display:none;margin-bottom:0.4rem;position:relative}
#image-preview{max-height:55px;border-radius:6px;border:1px solid var(--border);display:block}
#remove-image{position:absolute;top:-5px;right:-5px;background:#ef4444;border:none;border-radius:50%;width:15px;height:15px;color:white;font-size:0.5rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.input-row{
  display:flex;align-items:flex-end;gap:0.4rem;
  background:rgba(88,184,232,0.03);
  border:1px solid rgba(88,184,232,0.08);
  border-radius:12px;padding:0.45rem 0.45rem 0.45rem 0.8rem;
  transition:border-color 0.2s,box-shadow 0.2s;
}
.input-row:focus-within{border-color:rgba(88,184,232,0.2);box-shadow:0 0 25px rgba(88,184,232,0.04)}
#input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:'Inter',sans-serif;font-size:0.82rem;resize:none;max-height:90px;line-height:1.6;padding:0.18rem 0}
#input::placeholder{color:rgba(120,170,210,0.3)}
.input-actions{display:flex;gap:0.28rem;align-items:center}
.btn-tool{background:none;border:1px solid rgba(88,184,232,0.07);border-radius:7px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);transition:all 0.15s;font-size:0.78rem;flex-shrink:0}
.btn-tool:hover{color:var(--accent);border-color:rgba(88,184,232,0.2)}
.btn-tool.recording{color:#f87171;border-color:#f87171;animation:micPulse 1s infinite}
@keyframes micPulse{0%,100%{box-shadow:0 0 0 0 rgba(248,113,113,0.3)}50%{box-shadow:0 0 0 4px rgba(248,113,113,0)}}
.btn-send{background:rgba(58,159,208,0.8);border:none;border-radius:8px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#000;transition:all 0.15s;flex-shrink:0}
.btn-send:hover{background:var(--accent);box-shadow:0 0 20px rgba(88,184,232,0.3)}
.btn-send:disabled{opacity:0.2;cursor:not-allowed}
.char-hint{font-size:0.58rem;color:rgba(120,170,210,0.15);text-align:center;margin-top:0.35rem;font-family:'JetBrains Mono',monospace;letter-spacing:0.5px}

/* ══ ACTION CARDS ══ */
.action-card{border-radius:12px;padding:0.8rem 0.9rem;margin:0 0 0.4rem;backdrop-filter:blur(20px)}
.action-card.email-t,.action-card.reply-t{border:1px solid rgba(88,184,232,0.15);background:rgba(88,184,232,0.04)}
.action-card.event-t{border:1px solid rgba(99,160,255,0.18);background:rgba(99,160,255,0.04)}
.action-card.delete-t{border:1px solid rgba(248,113,113,0.18);background:rgba(248,113,113,0.04)}
.action-label{font-size:0.56rem;color:var(--muted);margin-bottom:0.35rem;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:2px}
.action-field{font-size:0.78rem;color:var(--text);margin-bottom:0.12rem}
.action-field strong{color:var(--accent);font-weight:500}
.action-card.event-t .action-field strong{color:#93c5fd}
.action-card.delete-t .action-field strong{color:#f87171}
.action-body{font-size:0.7rem;color:var(--muted);margin-top:0.3rem;white-space:pre-wrap;line-height:1.5;font-family:'JetBrains Mono',monospace;background:rgba(0,0,20,0.4);border-radius:5px;padding:0.35rem 0.5rem}
.action-btns{display:flex;gap:0.3rem;margin-top:0.6rem}
.btn-confirm{border:none;border-radius:7px;padding:0.3rem 0.7rem;font-weight:400;cursor:pointer;font-size:0.74rem;font-family:'Inter',sans-serif;transition:all 0.15s}
.btn-confirm.green{background:rgba(88,184,232,0.1);color:var(--accent);border:1px solid rgba(88,184,232,0.2)}.btn-confirm.green:hover{background:rgba(88,184,232,0.18)}
.btn-confirm.blue{background:rgba(99,160,255,0.1);color:#93c5fd;border:1px solid rgba(99,160,255,0.2)}.btn-confirm.blue:hover{background:rgba(99,160,255,0.18)}
.btn-confirm.red{background:rgba(248,113,113,0.1);color:#f87171;border:1px solid rgba(248,113,113,0.2)}.btn-confirm.red:hover{background:rgba(248,113,113,0.18)}
.btn-cancel-action{background:none;border:1px solid var(--border);border-radius:7px;padding:0.3rem 0.7rem;color:var(--muted);cursor:pointer;font-size:0.74rem;font-family:'Inter',sans-serif;transition:all 0.15s}
.btn-cancel-action:hover{color:var(--text)}

#messages::-webkit-scrollbar{width:2px}
#messages::-webkit-scrollbar-track{background:transparent}
#messages::-webkit-scrollbar-thumb{background:rgba(88,184,232,0.1);border-radius:2px}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="overlay"></div>

<div id="login-screen" style="display:none">
  <div class="login-title"><h1>Nexus</h1><p>neural · local · always on</p></div>
  <div class="login-box">
    <p>Connecte ton compte Google pour accéder à tes emails et ton agenda.</p>
    <a class="btn-google" href="/auth">
      <svg width="16" height="16" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2.01c-.72.48-1.63.77-2.7.77-2.08 0-3.84-1.4-4.47-3.28H1.83v2.07A8 8 0 0 0 8.98 17z"/><path fill="#FBBC05" d="M4.51 10.54A4.8 4.8 0 0 1 4.26 9c0-.53.09-1.05.25-1.54V5.39H1.83A8 8 0 0 0 .98 9c0 1.29.31 2.51.85 3.61l2.68-2.07z"/><path fill="#EA4335" d="M8.98 3.58c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 .98 9l2.83 2.17C4.14 9 6.43 3.58 8.98 3.58z"/></svg>
      Continuer avec Google
    </a>
    <div class="divider">ou</div>
    <button class="btn-skip" onclick="startWithoutGoogle()">Continuer sans Google</button>
  </div>
</div>

<div id="app" style="display:none">
  <header>
    <div class="header-left">
      <div class="logo-sm">Nx</div>
      <span class="header-name">Nexus</span>
      <div class="status-dot"></div>
    </div>
    <div class="header-right">
      <div class="user-badge" id="user-badge" style="display:none"><span id="user-email-label">●</span></div>
      <button class="btn-icon" id="btn-voice" title="Voix" onclick="toggleVoice()">🔈</button>
      <button class="btn-icon" onclick="logout()">↩</button>
    </div>
  </header>

  <div class="quick-actions">
    <button class="chip" onclick="quickAsk('Resume mes 5 derniers emails')">📧 emails</button>
    <button class="chip" onclick="quickAsk('Quels sont mes rendez-vous aujourd\'hui ?')">📅 agenda</button>
    <button class="chip" onclick="quickAsk('Y a-t-il des emails urgents ?')">⚡ urgent</button>
    <button class="chip" onclick="quickAsk('Qu\'est-ce que j\'ai de prévu cette semaine ?')">🗓 semaine</button>
    <button class="chip" onclick="quickAsk('Quels emails sont non lus ?')">🔔 non lus</button>
    <button class="chip" onclick="quickAsk('Donne-moi mon briefing du matin')">☀️ briefing</button>
  </div>

  <div id="messages">
    <div class="welcome" id="welcome">
      <h2>Nexus</h2>
      <p id="welcome-sub">en attente</p>
    </div>
  </div>

  <div class="input-area">
    <div id="image-preview-container" style="display:none">
      <img id="image-preview" src="" alt=""/>
      <button id="remove-image" onclick="removeImage()">✕</button>
    </div>
    <div class="input-row">
      <textarea id="input" placeholder="Message..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <div class="input-actions">
        <input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleImageUpload(event)">
        <button class="btn-tool" onclick="document.getElementById('file-input').click()">🖼️</button>
        <button class="btn-tool" id="btn-mic" onclick="toggleMic()">🎤</button>
        <button class="btn-send" id="btn-send" onclick="sendMessage()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
    <div class="char-hint">enter · shift+enter saut · ctrl+v image</div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════
//  NEURAL SPHERE — full screen, organic, filaments, breathing
// ══════════════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H;

// Sphere state
let nexusState = 'idle'; // idle | thinking | speaking

// ── Node system ──
const TOTAL = 320;
let nodes = [];

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  buildNodes();
}

function buildNodes() {
  nodes = [];
  const R = Math.min(W, H) * 0.42; // big — fills the screen
  for (let i = 0; i < TOTAL; i++) {
    // Fibonacci spiral distribution
    const phi   = Math.acos(1 - 2*(i+0.5)/TOTAL);
    const theta = Math.PI*(1+Math.sqrt(5))*i;
    const jitter = 0.85 + 0.3*Math.random(); // organic non-perfect sphere
    nodes.push({
      // base sphere coords
      bx: Math.sin(phi)*Math.cos(theta)*R*jitter,
      by: Math.sin(phi)*Math.sin(theta)*R*jitter,
      bz: Math.cos(phi)*R*jitter,
      // current projected
      px:0, py:0, pz:0, sc:0,
      // organic drift
      driftX: (Math.random()-0.5)*0.4,
      driftY: (Math.random()-0.5)*0.4,
      driftZ: (Math.random()-0.5)*0.4,
      driftAmp: 8 + Math.random()*18,
      phase: Math.random()*Math.PI*2,
      phaseSpeed: 0.004 + Math.random()*0.006,
      sz: 0.6 + Math.random()*1.8,
      bright: 0.3 + Math.random()*0.7
    });
  }
}

// ── Rotation state — slow oscillating "breathing" ──
let rotY = 0, rotX = 0.2;
let targetRotY = 0;
let breathT = 0;

// ── Project 3D → 2D ──
function project(x, y, z) {
  const fov = Math.min(W, H) * 1.1;
  const cy=Math.cos(rotX), sy=Math.sin(rotX);
  const cz=Math.cos(rotY), sz=Math.sin(rotY);
  // Rotate Y
  let x1 =  x*cz + z*sz;
  let z1  = -x*sz + z*cz;
  // Rotate X
  let y1  =  y*cy - z1*sy;
  let z2  =  y*sy + z1*cy;
  const d = fov / (fov + z2 + 50);
  return { x: x1*d + W/2, y: y1*d + H/2, z: z2, sc: d };
}

// ── Draw loop ──
let frame = 0;
function draw() {
  requestAnimationFrame(draw);
  ctx.clearRect(0, 0, W, H);
  frame++;
  breathT += 0.008;

  // Speed based on state
  const spinSpeed  = nexusState==='thinking' ? 0.007 : nexusState==='speaking' ? 0.004 : 0.0015;
  const driftSpeed = nexusState==='thinking' ? 2.2   : nexusState==='speaking' ? 1.4   : 1.0;

  // Slow oscillating rotation — va et vient
  rotY += spinSpeed + 0.002*Math.sin(breathT*0.3);
  rotX  = 0.15 + 0.08*Math.sin(breathT*0.2);

  // Project all nodes with organic drift
  for (const n of nodes) {
    n.phase += n.phaseSpeed * driftSpeed;
    const drift = n.driftAmp * Math.sin(n.phase);
    const p = project(
      n.bx + n.driftX*drift,
      n.by + n.driftY*drift,
      n.bz + n.driftZ*drift
    );
    n.px = p.x; n.py = p.y; n.pz = p.z; n.sc = p.sc;
  }

  // Sort by Z
  const sorted = [...nodes].sort((a,b) => a.pz - b.pz);

  // ── Draw filaments (connections) ──
  const MAXD    = nexusState==='thinking' ? 110 : 90;
  const MAXDIST = MAXD * MAXD;

  for (let i=0; i<sorted.length; i++) {
    const a = sorted[i];
    for (let j=i+1; j<sorted.length; j++) {
      const b = sorted[j];
      const dx = a.px-b.px, dy = a.py-b.py;
      const d2 = dx*dx + dy*dy;
      if (d2 > MAXDIST) continue;

      const d    = Math.sqrt(d2);
      const t    = 1 - d/MAXD;
      const avgZ = (a.sc + b.sc) * 0.5;

      // Pulse on thinking
      const pulse = nexusState==='thinking'
        ? 0.4 + 0.6*((Math.sin(a.phase*1.5)+1)/2)
        : 0.5;

      const alpha = t * t * avgZ * 0.6 * pulse;

      // Depth-based color: deep = dark blue, near = bright cyan
      const depthT = Math.max(0, Math.min(1, (avgZ - 0.35)/0.65));
      const r = Math.round(5  + depthT*50);
      const g = Math.round(80 + depthT*130);
      const bl= Math.round(160+ depthT*80);

      ctx.beginPath();
      ctx.moveTo(a.px, a.py);
      ctx.lineTo(b.px, b.py);

      // Bright filament flash on thinking
      if (nexusState==='thinking' && pulse > 0.82 && t > 0.6) {
        ctx.strokeStyle = `rgba(160,220,255,${(alpha*2.5).toFixed(3)})`;
        ctx.lineWidth = 1.5;
      } else {
        ctx.strokeStyle = `rgba(${r},${g},${bl},${alpha.toFixed(3)})`;
        ctx.lineWidth = 0.5;
      }
      ctx.stroke();
    }
  }

  // ── Draw nodes ──
  for (const n of sorted) {
    const pulse  = (Math.sin(n.phase)+1)/2;
    const depthT = Math.max(0, Math.min(1, (n.sc-0.35)/0.65));
    const alpha  = n.bright * (0.25 + 0.75*pulse) * n.sc;
    const r      = n.sz * n.sc * (nexusState==='thinking' ? 1+pulse*0.5 : 1);

    // Soft glow aura
    if (pulse > 0.75 && n.sc > 0.6) {
      const gR = Math.round(10  + depthT*40);
      const gG = Math.round(100 + depthT*120);
      const gB = Math.round(180 + depthT*60);
      ctx.beginPath();
      ctx.arc(n.px, n.py, r*5, 0, Math.PI*2);
      const grad = ctx.createRadialGradient(n.px,n.py,0,n.px,n.py,r*5);
      grad.addColorStop(0, `rgba(${gR},${gG},${gB},${(alpha*0.18).toFixed(3)})`);
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad;
      ctx.fill();
    }

    // Core dot
    const cr = Math.round(20  + depthT*60);
    const cg = Math.round(120 + depthT*110);
    const cb = Math.round(200 + depthT*50);
    ctx.beginPath();
    ctx.arc(n.px, n.py, Math.max(0.4, r), 0, Math.PI*2);
    ctx.fillStyle = `rgba(${cr},${cg},${cb},${(alpha*0.9).toFixed(3)})`;
    ctx.fill();
  }
}

window.addEventListener('resize', resize);
resize();
draw();

//  APP LOGIC
// ══════════════════════════════════════════════════════════════
let messages=[], voiceEnabled=false, currentImage=null, recognition=null, isRecording=false;
let selectedVoice=null, voiceReady=false;

function getToken()  { return localStorage.getItem('nexus_token'); }
function getRefresh(){ return localStorage.getItem('nexus_refresh'); }
function getUserId() { return localStorage.getItem('nexus_user_id'); }
function isGoogle()  { return !!(getToken()&&getUserId()); }
function setTokens(a,r,u){
  if(a){localStorage.setItem('nexus_token',a);localStorage.setItem('nexus_token_time',Date.now().toString());}
  if(r)localStorage.setItem('nexus_refresh',r);
  if(u)localStorage.setItem('nexus_user_id',u);
}

// ── Voice ──
function initVoice(){
  if(!('speechSynthesis'in window))return;
  const load=()=>{
    const vs=window.speechSynthesis.getVoices();if(!vs.length)return;
    voiceReady=true;
    const prio=['Thomas','Amelie','Marie','Mathieu','Google français','Google French'];
    for(const n of prio){const v=vs.find(v=>v.name.includes(n));if(v){selectedVoice=v;break;}}
    if(!selectedVoice)selectedVoice=vs.find(v=>v.lang.startsWith('fr'))||vs[0];
  };
  window.speechSynthesis.onvoiceschanged=load;load();
}
initVoice();

function speak(text){
  if(!voiceReady||!voiceEnabled)return;
  window.speechSynthesis.cancel();
  const clean=text.replace(/\*\*/g,'').replace(/\*/g,'').replace(/<[^>]*>/g,'')
    .replace(/```[\s\S]*?```/g,'').replace(/`[^`]+`/g,'')
    .replace(/#{1,3} /g,'').replace(/\n{2,}/g,'. ').replace(/\n/g,' ').trim();
  if(!clean)return;
  const utt=new SpeechSynthesisUtterance(clean);
  if(selectedVoice)utt.voice=selectedVoice;
  utt.lang=selectedVoice?.lang||'fr-FR';utt.rate=0.95;utt.pitch=1.0;utt.volume=1.0;
  utt.onstart=()=>{nexusState='speaking';};
  utt.onend=()=>{nexusState='idle';};
  utt.onerror=()=>{nexusState='idle';};
  window.speechSynthesis.speak(utt);
}

function toggleVoice(){
  voiceEnabled=!voiceEnabled;
  const btn=document.getElementById('btn-voice');
  btn.classList.toggle('active',voiceEnabled);
  btn.textContent=voiceEnabled?'🔊':'🔈';
  if(voiceEnabled)speak('Voix activée.');
}

// ── Auth ──
async function init(){
  const p=new URLSearchParams(window.location.search);
  const t=p.get('access_token'),r=p.get('refresh_token'),u=p.get('user_id');
  if(t){setTokens(t,r,u?decodeURIComponent(u):null);window.history.replaceState({},'','/');showApp();return;}
  const saved=getToken(),age=Date.now()-parseInt(localStorage.getItem('nexus_token_time')||'0');
  if(saved&&age<55*60*1000){showApp();}
  else if(getRefresh()){await refreshAccessToken();}
  else if(localStorage.getItem('nexus_no_google')==='1'){showApp();}
  else{showLogin();}
}

function showLogin(){document.getElementById('login-screen').style.display='flex';document.getElementById('app').style.display='none';}
function showApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  const uid=getUserId();
  if(uid){
    document.getElementById('user-badge').style.display='flex';
    document.getElementById('user-email-label').textContent='● '+uid.split('@')[0];
    document.getElementById('welcome-sub').textContent='gmail · agenda · local';
  }
  document.getElementById('input').focus();
  startChecks();
}
function startWithoutGoogle(){localStorage.setItem('nexus_no_google','1');showApp();}
function logout(){localStorage.clear();messages=[];showLogin();}

async function refreshAccessToken(){
  const rt=getRefresh();if(!rt){showLogin();return;}
  try{
    const res=await fetch('/api/refresh',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({refresh_token:rt})});
    const data=await res.json();
    if(data.access_token){setTokens(data.access_token,null,null);showApp();}
    else{localStorage.clear();showLogin();}
  }catch(e){if(getToken()){showApp();}else{showLogin();}}
}
setInterval(async()=>{
  if(!getRefresh())return;
  const age=Date.now()-parseInt(localStorage.getItem('nexus_token_time')||'0');
  if(age>50*60*1000)await refreshAccessToken();
},60*1000);

// ── Image ──
function handleImageUpload(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>setImage(ev.target.result);r.readAsDataURL(f);}
function setImage(d){currentImage=d;document.getElementById('image-preview').src=d;document.getElementById('image-preview-container').style.display='block';}
function removeImage(){currentImage=null;document.getElementById('image-preview-container').style.display='none';document.getElementById('file-input').value='';}
document.addEventListener('paste',e=>{const items=e.clipboardData?.items;if(!items)return;for(const item of items){if(item.type.startsWith('image/')){const r=new FileReader();r.onload=ev=>setImage(ev.target.result);r.readAsDataURL(item.getAsFile());e.preventDefault();break;}}});

// ── Mic ──
function toggleMic(){
  if(!('webkitSpeechRecognition'in window)&&!('SpeechRecognition'in window)){addMessage('ai','Reconnaissance vocale non supportée.');return;}
  if(isRecording){recognition?.stop();return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR();recognition.lang='fr-FR';recognition.continuous=false;recognition.interimResults=false;
  recognition.onstart=()=>{isRecording=true;document.getElementById('btn-mic').classList.add('recording');};
  recognition.onresult=e=>{const t=e.results[0][0].transcript;document.getElementById('input').value=t;autoResize(document.getElementById('input'));sendMessage();};
  recognition.onend=()=>{isRecording=false;document.getElementById('btn-mic').classList.remove('recording');};
  recognition.onerror=()=>{isRecording=false;document.getElementById('btn-mic').classList.remove('recording');};
  recognition.start();
}

// ── Markdown ──
function renderMarkdown(text){
  let h=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  h=h.replace(/```(\w*)\n?([\s\S]*?)```/g,(_,lang,code)=>`<pre><button class="copy-code-btn" onclick="copyCode(this)">copier</button><code class="language-${lang}">${code.trim()}</code></pre>`);
  h=h.replace(/`([^`\n]+)`/g,'<code>$1</code>');
  h=h.replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/^# (.+)$/gm,'<h1>$1</h1>');
  h=h.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*([^*\n]+)\*/g,'<em>$1</em>');
  h=h.replace(/^[-*+] (.+)$/gm,'<li>$1</li>').replace(/^(\d+)\. (.+)$/gm,'<li>$2</li>');
  const lines=h.split('\n');let result='',inList=false;
  for(const line of lines){
    if(line.startsWith('<li>')){if(!inList){result+='<ul>';inList=true;}result+=line;}
    else{if(inList){result+='</ul>';inList=false;}if(!line.trim()||line.startsWith('<h')||line.startsWith('<pre'))result+=line;else result+='<p>'+line+'</p>';}
  }
  if(inList)result+='</ul>';
  return result;
}
function copyCode(btn){navigator.clipboard.writeText(btn.nextElementSibling.textContent).then(()=>{btn.textContent='✓';btn.classList.add('copied');setTimeout(()=>{btn.textContent='copier';btn.classList.remove('copied');},2000);});}

// ── Messages ──
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,90)+'px';}
function quickAsk(text){document.getElementById('input').value=text;sendMessage();}

function addMessage(role,text,imageData){
  const welcome=document.getElementById('welcome');if(welcome)welcome.remove();
  const container=document.getElementById('messages');
  const div=document.createElement('div');div.className='msg '+role;
  const label=document.createElement('div');label.className='msg-label';label.textContent=role==='user'?'vous':'nexus';
  const bubble=document.createElement('div');bubble.className='bubble';
  if(imageData){const img=document.createElement('img');img.src=imageData;img.className='msg-image';bubble.appendChild(img);}
  const textDiv=document.createElement('div');
  if(role==='ai'){textDiv.innerHTML=renderMarkdown(text);setTimeout(()=>{textDiv.querySelectorAll('pre code').forEach(el=>hljs.highlightElement(el));},10);}
  else{textDiv.style.cssText='white-space:pre-wrap;word-break:break-word;';textDiv.textContent=text;}
  bubble.appendChild(textDiv);
  const copyBtn=document.createElement('button');copyBtn.className='copy-msg-btn';copyBtn.textContent='📋';
  copyBtn.onclick=()=>{navigator.clipboard.writeText(text).then(()=>{copyBtn.textContent='✓';copyBtn.classList.add('copied');setTimeout(()=>{copyBtn.textContent='📋';copyBtn.classList.remove('copied');},2000);});};
  bubble.appendChild(copyBtn);
  div.appendChild(label);div.appendChild(bubble);container.appendChild(div);
  container.scrollTop=container.scrollHeight;
  return div;
}

function addTyping(){
  const container=document.getElementById('messages');
  const div=document.createElement('div');div.className='msg ai typing';div.id='typing';
  div.innerHTML='<div class="msg-label">nexus</div><div class="bubble"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
  container.appendChild(div);container.scrollTop=container.scrollHeight;
}
function removeTyping(){const t=document.getElementById('typing');if(t)t.remove();}

// ── Send ──
async function sendMessage(){
  const input=document.getElementById('input'),text=input.value.trim();
  if(!text&&!currentImage)return;
  const img=currentImage;
  input.value='';input.style.height='auto';
  document.getElementById('btn-send').disabled=true;
  removeImage();
  addMessage('user',text||'Image',img);
  let userContent;
  if(img){const base64=img.split(',')[1],mime=img.split(';')[0].split(':')[1];userContent=[{type:'image_url',image_url:{url:`data:${mime};base64,${base64}`}},{type:'text',text:text||'Décris cette image.'}];}
  else{userContent=text;}
  messages.push({role:'user',content:userContent});
  addTyping();nexusState='thinking';

  try{
    const token=getToken(),uid=getUserId();
    const body={messages};
    if(token&&uid){body.accessToken=token;body.userId=uid;}
    const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const data=await res.json();
    removeTyping();nexusState='idle';
    const reply=data.content?.[0]?.text||"Je n'ai pas pu traiter ta demande.";
    messages.push({role:'assistant',content:reply});

    const deleteMatch=reply.match(/DELETE_EVENT\[eventId:(.*?)\|summary:(.*?)\]/s);
    const eventMatch =reply.match(/CREATE_EVENT\[summary:(.*?)\|start:(.*?)\|end:(.*?)(?:\|location:(.*?))?(?:\|description:(.*?))?\]/s);
    const emailMatch =reply.match(/SEND_EMAIL\[to:(.*?)\|subject:(.*?)\|body:(.*?)\]/s);
    const replyMatch =reply.match(/REPLY_EMAIL\[to:(.*?)\|subject:(.*?)\|body:(.*?)\|threadId:(.*?)\]/s);
    const memMatch   =reply.match(/SAVE_MEMORY\[(.*?)\]/s);

    if(memMatch){const md={};memMatch[1].split('|').forEach(p=>{const idx=p.indexOf(':');if(idx>-1)md[p.slice(0,idx).trim()]=p.slice(idx+1).trim();});if(uid)md.userId=uid;fetch('/api/memory',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(md)});}

    const clean=reply.replace(/DELETE_EVENT\[.*?\]/s,'').replace(/CREATE_EVENT\[.*?\]/s,'').replace(/SEND_EMAIL\[.*?\]/s,'').replace(/REPLY_EMAIL\[.*?\]/s,'').replace(/SAVE_MEMORY\[.*?\]/s,'').trim();

    if(deleteMatch&&token){showActionCard('delete',{eventId:deleteMatch[1].trim(),summary:deleteMatch[2].trim()});addMessage('ai',clean||'Suppression en attente.');}
    else if(eventMatch&&token){showActionCard('event',{summary:eventMatch[1].trim(),start:eventMatch[2].trim(),end:eventMatch[3].trim(),location:eventMatch[4]?.trim()||''});addMessage('ai',clean||'Événement en attente.');}
    else if(emailMatch&&token){showActionCard('email',{to:emailMatch[1].trim(),subject:emailMatch[2].trim(),body:emailMatch[3].trim()});addMessage('ai',clean||'Email en attente.');}
    else if(replyMatch&&token){showActionCard('reply',{to:replyMatch[1].trim(),subject:replyMatch[2].trim(),body:replyMatch[3].trim(),threadId:replyMatch[4].trim()});addMessage('ai',clean||'Réponse en attente.');}
    else{addMessage('ai',clean||reply);}

    if(voiceEnabled)speak(clean||reply);
  }catch(e){removeTyping();nexusState='idle';addMessage('ai','Erreur de connexion.');}
  document.getElementById('btn-send').disabled=false;
  document.getElementById('input').focus();
}

// ── Action cards ──
function showActionCard(type,data){
  const ex=document.getElementById('action-card');if(ex)ex.remove();
  const div=document.createElement('div');div.id='action-card';div.className='action-card '+type+'-t';
  const label=document.createElement('div');label.className='action-label';
  label.textContent={email:'email à envoyer',reply:'réponse à envoyer',event:'événement à créer',delete:'événement à supprimer'}[type];
  div.appendChild(label);
  function af(l,v){const d=document.createElement('div');d.className='action-field';d.innerHTML='<strong>'+l+'</strong> '+v;div.appendChild(d);}
  if(type==='email'||type==='reply'){af('→',data.to);af('objet :',type==='reply'?'Re: '+data.subject:data.subject);const bd=document.createElement('div');bd.className='action-body';bd.textContent=data.body;div.appendChild(bd);}
  else if(type==='event'){af('titre :',data.summary);const s=new Date(data.start).toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',hour:'2-digit',minute:'2-digit',timeZone:'Europe/Brussels'});af('quand :',s);if(data.location)af('lieu :',data.location);}
  else if(type==='delete'){af('titre :',data.summary);}
  const btns=document.createElement('div');btns.className='action-btns';
  const bc=document.createElement('button');bc.className='btn-confirm '+(type==='delete'?'red':type==='event'?'blue':'green');
  bc.textContent={email:'Envoyer',reply:'Répondre',event:'Créer',delete:'Supprimer'}[type];
  bc.addEventListener('click',()=>executeAction(type,data));
  const bx=document.createElement('button');bx.className='btn-cancel-action';bx.textContent='Annuler';bx.addEventListener('click',()=>div.remove());
  btns.appendChild(bc);btns.appendChild(bx);div.appendChild(btns);
  document.getElementById('messages').appendChild(div);
  document.getElementById('messages').scrollTop=document.getElementById('messages').scrollHeight;
}

async function executeAction(type,data){
  const card=document.getElementById('action-card');if(card)card.remove();
  addTyping();nexusState='thinking';
  try{
    const token=getToken();
    const eps={email:'/api/send-email',reply:'/api/reply-email',event:'/api/create-event',delete:'/api/delete-event'};
    const body=type==='delete'?{accessToken:token,eventId:data.eventId}:{accessToken:token,...data};
    const res=await fetch(eps[type],{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const result=await res.json();removeTyping();nexusState='idle';
    const msgs={email:'Email envoyé à '+data.to,reply:'Réponse envoyée à '+data.to,event:'Événement créé : '+data.summary,delete:'Événement supprimé : '+data.summary};
    addMessage('ai',result.success?'✅ '+msgs[type]:'❌ Erreur : '+result.error);
  }catch(e){removeTyping();nexusState='idle';addMessage('ai','Erreur.');}
}

// ── Notifications ──
async function requestNotificationPermission(){if('Notification'in window&&Notification.permission==='default')await Notification.requestPermission();}
function sendNotification(title,body){if(Notification.permission!=='granted')return;new Notification(title,{body}).onclick=()=>window.focus();}
function checkMorningBriefing(){
  const now=new Date(),h=now.getHours(),last=localStorage.getItem('nexus_last_briefing'),today=now.toDateString();
  if(h>=7&&h<10&&last!==today&&isGoogle()){localStorage.setItem('nexus_last_briefing',today);setTimeout(()=>{sendNotification('☀️ Bonjour','Ton briefing est prêt.');setTimeout(()=>quickAsk('Briefing du matin : agenda et emails importants'),2000);},3000);}
}
function startChecks(){requestNotificationPermission();checkMorningBriefing();setInterval(checkMorningBriefing,60*1000);}
