<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f10;
    --surface: #18181b;
    --surface2: #222226;
    --border: #2e2e34;
    --text: #e4e4e7;
    --muted: #71717a;
    --accent: #6ee7b7;
    --accent2: #34d399;
    --user-bubble: #1e293b;
    --ai-bubble: #18181b;
    --danger: #f87171;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* LOGIN SCREEN */
  #login-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100dvh;
    gap: 2rem;
    padding: 2rem;
  }

  .logo-mark {
    width: 64px;
    height: 64px;
    border-radius: 18px;
    background: linear-gradient(135deg, #064e3b, #065f46);
    border: 1px solid #059669;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 1.5rem;
    color: var(--accent);
    letter-spacing: -2px;
  }

  .login-title {
    text-align: center;
  }

  .login-title h1 {
    font-size: 2rem;
    font-weight: 300;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  .login-title p {
    color: var(--muted);
    font-size: 0.9rem;
    margin-top: 0.4rem;
  }

  .login-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    width: 100%;
    max-width: 360px;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .login-box p {
    font-size: 0.85rem;
    color: var(--muted);
    text-align: center;
    line-height: 1.5;
  }

  .btn-google {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.75rem 1.25rem;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    text-decoration: none;
  }

  .btn-google:hover {
    background: #2a2a30;
    border-color: #3f3f46;
  }

  .btn-google svg { flex-shrink: 0; }

  .divider {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    color: var(--muted);
    font-size: 0.75rem;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .btn-skip {
    background: none;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.75rem 1.25rem;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-skip:hover { color: var(--text); border-color: #3f3f46; }

  /* MAIN APP */
  #app { display: none; flex-direction: column; height: 100dvh; }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.875rem 1.25rem;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
  }

  .header-left { display: flex; align-items: center; gap: 0.75rem; }

  .logo-sm {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: linear-gradient(135deg, #064e3b, #065f46);
    border: 1px solid #059669;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--accent);
    letter-spacing: -1px;
  }

  .header-name {
    font-size: 0.95rem;
    font-weight: 500;
    letter-spacing: -0.2px;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent2);
    box-shadow: 0 0 6px var(--accent2);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .header-right { display: flex; align-items: center; gap: 0.5rem; }

  .user-badge {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.35rem 0.75rem;
    font-size: 0.8rem;
    color: var(--muted);
  }

  .user-badge .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent2);
  }

  .btn-icon {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 34px;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    font-size: 1rem;
  }
  .btn-icon:hover { color: var(--text); border-color: #3f3f46; background: var(--surface); }
  .btn-icon.active { color: var(--accent); border-color: #059669; background: #064e3b22; }

  /* QUICK ACTIONS */
  .quick-actions {
    display: flex;
    gap: 0.5rem;
    padding: 0.75rem 1.25rem;
    overflow-x: auto;
    scrollbar-width: none;
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
  }
  .quick-actions::-webkit-scrollbar { display: none; }

  .chip {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 0.4rem 0.875rem;
    font-size: 0.8rem;
    color: var(--muted);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .chip:hover { color: var(--text); border-color: #3f3f46; background: var(--surface2); }
  .chip span { font-size: 0.9rem; }

  /* MESSAGES */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .msg {
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
    max-width: 85%;
    animation: fadeUp 0.2s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.ai { align-self: flex-start; align-items: flex-start; }

  .bubble {
    padding: 0.75rem 1rem;
    border-radius: 14px;
    font-size: 0.9rem;
    line-height: 1.55;
  }

  .msg.user .bubble {
    background: var(--user-bubble);
    border: 1px solid #2d3f55;
    border-bottom-right-radius: 4px;
    color: #cbd5e1;
  }

  .msg.ai .bubble {
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }

  .msg.ai .bubble strong { color: var(--accent); font-weight: 500; }
  .msg.ai .bubble em { color: var(--muted); font-style: normal; }

  .msg-label {
    font-size: 0.7rem;
    color: var(--muted);
    padding: 0 0.25rem;
    font-family: 'DM Mono', monospace;
  }

  /* TYPING */
  .typing .bubble {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 0.875rem 1rem;
  }

  .typing-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--muted);
    animation: bounce 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); background: var(--accent); }
  }

  /* WELCOME */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    gap: 0.75rem;
    padding: 2rem;
    text-align: center;
  }

  .welcome-icon {
    width: 56px;
    height: 56px;
    border-radius: 16px;
    background: linear-gradient(135deg, #064e3b, #065f46);
    border: 1px solid #059669;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 1.25rem;
    color: var(--accent);
    letter-spacing: -1px;
    margin-bottom: 0.5rem;
  }

  .welcome h2 {
    font-size: 1.25rem;
    font-weight: 400;
    color: var(--text);
  }

  .welcome p {
    font-size: 0.85rem;
    color: var(--muted);
    max-width: 280px;
    line-height: 1.6;
  }

  /* INPUT */
  .input-area {
    padding: 1rem 1.25rem;
    border-top: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    align-items: flex-end;
    gap: 0.625rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 0.625rem 0.625rem 0.625rem 1rem;
    transition: border-color 0.15s;
  }

  .input-row:focus-within { border-color: #059669; }

  #input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    resize: none;
    max-height: 120px;
    line-height: 1.5;
    padding: 0.25rem 0;
  }

  #input::placeholder { color: var(--muted); }

  .input-actions { display: flex; gap: 0.375rem; align-items: center; }

  .btn-send {
    background: var(--accent2);
    border: none;
    border-radius: 9px;
    width: 34px;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: #022c22;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .btn-send:hover { background: var(--accent); transform: scale(1.05); }
  .btn-send:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  .char-hint {
    font-size: 0.7rem;
    color: var(--muted);
    text-align: center;
    margin-top: 0.5rem;
    font-family: 'DM Mono', monospace;
  }

  /* SCROLLBAR */
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="logo-mark">Nx</div>
  <div class="login-title">
    <h1>Nexus</h1>
    <p>Ton assistant IA personnel</p>
  </div>
  <div class="login-box">
    <p>Connecte ton compte Google pour accéder à tes emails et ton agenda.</p>
    <a class="btn-google" id="btn-google-login" href="/auth">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2.01c-.72.48-1.63.77-2.7.77-2.08 0-3.84-1.4-4.47-3.28H1.83v2.07A8 8 0 0 0 8.98 17z"/><path fill="#FBBC05" d="M4.51 10.54A4.8 4.8 0 0 1 4.26 9c0-.53.09-1.05.25-1.54V5.39H1.83A8 8 0 0 0 .98 9c0 1.29.31 2.51.85 3.61l2.68-2.07z"/><path fill="#EA4335" d="M8.98 3.58c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 .98 9l2.83 2.17C4.14 9 6.43 3.58 8.98 3.58z"/></svg>
      Continuer avec Google
    </a>
    <div class="divider">ou</div>
    <button class="btn-skip" onclick="startWithoutGoogle()">Utiliser sans Gmail / Agenda</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <header>
    <div class="header-left">
      <div class="logo-sm">Nx</div>
      <span class="header-name">Nexus</span>
      <div class="status-dot"></div>
    </div>
    <div class="header-right">
      <div class="user-badge" id="user-badge" style="display:none">
        <div class="dot"></div>
        <span id="user-email-display"></span>
      </div>
      <button class="btn-icon" id="btn-voice" title="Voix" onclick="toggleVoice()">🔈</button>
      <button class="btn-icon" title="Déconnexion" onclick="logout()">↩</button>
    </div>
  </header>

  <div class="quick-actions">
    <button class="chip" onclick="quickAsk('Résume mes 5 derniers emails')"><span>📧</span> Emails récents</button>
    <button class="chip" onclick="quickAsk('Quels sont mes rendez-vous aujourd\'hui ?')"><span>📅</span> Agenda du jour</button>
    <button class="chip" onclick="quickAsk('Y a-t-il des emails urgents ?')"><span>⚡</span> Urgent</button>
    <button class="chip" onclick="quickAsk('Qu\'est-ce que j\'ai de prévu cette semaine ?')"><span>🗓️</span> Cette semaine</button>
    <button class="chip" onclick="quickAsk('Quels emails sont non lus ?')"><span>🔔</span> Non lus</button>
  </div>

  <div id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">Nx</div>
      <h2>Bonjour, je suis Nexus</h2>
      <p id="welcome-sub">Pose-moi n'importe quelle question ou utilise les raccourcis ci-dessus.</p>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="input" placeholder="Parle à Nexus..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <div class="input-actions">
        <button class="btn-send" id="btn-send" onclick="sendMessage()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
    <div class="char-hint">Entrée pour envoyer · Maj+Entrée pour nouvelle ligne</div>
  </div>
</div>

<script>
  let messages = [];
  let accessToken = null;
  let voiceEnabled = false;
  let hasGoogle = false;

  function init() {
    const params = new URLSearchParams(window.location.search);
    const token = params.get('access_token');
    const refresh = params.get('refresh_token');

    if (token) {
      accessToken = token;
      hasGoogle = true;
      if (refresh) localStorage.setItem('nexus_refresh', refresh);
      localStorage.setItem('nexus_token', token);
      localStorage.setItem('nexus_token_time', Date.now().toString());
      window.history.replaceState({}, '', '/');
      showApp(true);
    } else {
      const saved = localStorage.getItem('nexus_token');
      const savedTime = localStorage.getItem('nexus_token_time');
      const age = Date.now() - parseInt(savedTime || '0');
      if (saved && age < 55 * 60 * 1000) {
        accessToken = saved;
        hasGoogle = true;
        showApp(true);
      } else if (localStorage.getItem('nexus_refresh')) {
        refreshAccessToken();
      } else {
        document.getElementById('login-screen').style.display = 'flex';
      }
    }
  }

  async function refreshAccessToken() {
    const refreshToken = localStorage.getItem('nexus_refresh');
    if (!refreshToken) { document.getElementById('login-screen').style.display = 'flex'; return; }
    try {
      const res = await fetch('/api/refresh', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ refresh_token: refreshToken })
      });
      const data = await res.json();
      if (data.access_token) {
        accessToken = data.access_token;
        hasGoogle = true;
        localStorage.setItem('nexus_token', accessToken);
        localStorage.setItem('nexus_token_time', Date.now().toString());
        showApp(true);
      } else {
        localStorage.clear();
        document.getElementById('login-screen').style.display = 'flex';
      }
    } catch(e) { document.getElementById('login-screen').style.display = 'flex'; }
  }

  setInterval(async () => {
    const refreshToken = localStorage.getItem('nexus_refresh');
    if (!refreshToken) return;
    const age = Date.now() - parseInt(localStorage.getItem('nexus_token_time') || '0');
    if (age > 50 * 60 * 1000) await refreshAccessToken();
  }, 60 * 1000);

  function showApp(withGoogle) {
    if (withGoogle && accessToken) {
      localStorage.setItem('nexus_token', accessToken);
      document.getElementById('user-badge').style.display = 'flex';
      document.getElementById('user-email-display').textContent = 'Google connecté';
      document.getElementById('welcome-sub').textContent = 'Gmail et Agenda connectés. Pose-moi n\'importe quelle question !';
      hasGoogle = true;
    }
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('input').focus();
  }

  function startWithoutGoogle() {
    showApp(false);
  }

  function logout() {
    localStorage.clear();
    accessToken = null;
    hasGoogle = false;
    messages = [];
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function quickAsk(text) {
    document.getElementById('input').value = text;
    sendMessage();
  }

  function addMessage(role, text) {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `msg ${role}`;

    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = role === 'user' ? 'Toi' : 'Nexus';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    // Simple markdown: **bold**
    bubble.innerHTML = text
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n/g, '<br>');

    div.appendChild(label);
    div.appendChild(bubble);
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div;
  }

  function addTyping() {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg ai typing';
    div.id = 'typing';
    div.innerHTML = `<div class="msg-label">Nexus</div><div class="bubble"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function sendMessage() {
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = 'auto';
    document.getElementById('btn-send').disabled = true;

    addMessage('user', text);

    // Build system prompt
    let system = "Tu es Nexus, un assistant IA personnel sobre et efficace. Tu parles français. Sois concis et direct. Utilise **gras** pour les éléments clés.";
    if (hasGoogle && accessToken) {
      system += " L'utilisateur a connecté son compte Google. Son token d'accès est disponible pour interroger Gmail et Google Calendar si nécessaire.";
    }

    messages.push({ role: 'user', content: text });
    addTyping();

    try {
      const body = { messages };
      if (hasGoogle && accessToken) body.accessToken = accessToken;

      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });

      const data = await res.json();
      removeTyping();

      const reply = data.content?.[0]?.text || "Je n'ai pas pu traiter ta demande.";
      messages.push({ role: 'assistant', content: reply });

      // Détecter les actions
      const deleteMatch = reply.match(/DELETE_EVENT\[eventId:(.*?)\|summary:(.*?)\]/s);
      const eventMatch = reply.match(/CREATE_EVENT\[summary:(.*?)\|start:(.*?)\|end:(.*?)(?:\|location:(.*?))?(?:\|description:(.*?))?\]/s);
      const emailMatch = reply.match(/SEND_EMAIL\[to:(.*?)\|subject:(.*?)\|body:(.*?)\]/s);
      const replyMatch = reply.match(/REPLY_EMAIL\[to:(.*?)\|subject:(.*?)\|body:(.*?)\|threadId:(.*?)\]/s);

      if (deleteMatch && hasGoogle && accessToken) {
        const [, eventId, summary] = deleteMatch;
        showDeleteConfirm(eventId.trim(), summary.trim());
        addMessage('ai', reply.replace(/DELETE_EVENT\[.*?\]/s, '').trim() || `Je vais supprimer **${summary.trim()}**. Confirme ci-dessous.`);
      } else if (eventMatch && hasGoogle && accessToken) {
        const [, summary, start, end, location, description] = eventMatch;
        showEventConfirm(summary.trim(), start.trim(), end.trim(), location?.trim() || '', description?.trim() || '');
        addMessage('ai', reply.replace(/CREATE_EVENT\[.*?\]/s, '').trim() || `Je vais créer cet événement. Confirme ci-dessous.`);
      } else if (emailMatch && hasGoogle && accessToken) {
        const [, to, subject, emailBody] = emailMatch;
        showEmailConfirm(to.trim(), subject.trim(), emailBody.trim());
        addMessage('ai', reply.replace(/SEND_EMAIL\[.*?\]/s, '').trim() || `Je vais envoyer cet email à **${to.trim()}**. Confirme ci-dessous.`);
      } else if (replyMatch && hasGoogle && accessToken) {
        const [, to, subject, replyBody, threadId] = replyMatch;
        showReplyConfirm(to.trim(), subject.trim(), replyBody.trim(), threadId.trim());
        addMessage('ai', reply.replace(/REPLY_EMAIL\[.*?\]/s, '').trim() || `Je vais répondre à cet email. Confirme ci-dessous.`);
      } else {
        // Détecter si Nexus veut sauvegarder en mémoire
        const memoryMatch = reply.match(/SAVE_MEMORY\[(.*?)\]/s);
        if (memoryMatch) {
          const pairs = memoryMatch[1].split('|');
          const memoryData = {};
          pairs.forEach(pair => {
            const [key, ...valueParts] = pair.split(':');
            if (key && valueParts.length) memoryData[key.trim()] = valueParts.join(':').trim();
          });
          fetch('/api/memory', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(memoryData)
          });
        }
        addMessage('ai', reply.replace(/SAVE_MEMORY\[.*?\]/s, '').trim());
      }
      if (voiceEnabled) speak(reply);
    } catch(e) {
      removeTyping();
      addMessage('ai', "**Erreur de connexion.** Vérifie ta connexion internet.");
    }

    document.getElementById('btn-send').disabled = false;
    document.getElementById('input').focus();
  }

  function toggleVoice() {
    voiceEnabled = !voiceEnabled;

  }

  function speak(text) {
    if (!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const clean = text.replace(/\*\*/g, '').replace(/<[^>]*>/g, '');
    const utt = new SpeechSynthesisUtterance(clean);
    utt.lang = 'fr-FR';
    utt.rate = 1.05;
    utt.pitch = 1;
    window.speechSynthesis.speak(utt);
  }
