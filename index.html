<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #080810;
    --surface: #0f0f1a;
    --surface2: #161624;
    --border: #1e1e32;
    --border2: #2a2a45;
    --text: #e8e8f0;
    --muted: #5a5a7a;
    --accent: #7c6aff;
    --accent2: #a594ff;
    --accent-glow: rgba(124,106,255,0.15);
    --green: #4ade80;
    --red: #f87171;
    --user-bubble: #0d1527;
    --user-border: #1a2845;
  }
  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background-image: radial-gradient(ellipse at 20% 0%, rgba(124,106,255,0.06) 0%, transparent 60%), radial-gradient(ellipse at 80% 100%, rgba(124,106,255,0.04) 0%, transparent 60%);
  }
  #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100dvh; gap: 2.5rem; padding: 2rem; }
  .logo-hex { width: 72px; height: 72px; background: linear-gradient(135deg, #1a0f3c, #2d1a6e); border: 1px solid var(--accent); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-family: 'JetBrains Mono', monospace; font-size: 1.4rem; color: var(--accent2); box-shadow: 0 0 40px rgba(124,106,255,0.2), inset 0 1px 0 rgba(255,255,255,0.1); animation: float 3s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
  .login-title h1 { font-size: 2.5rem; font-weight: 700; letter-spacing: -1px; background: linear-gradient(135deg, var(--text), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; }
  .login-title p { color: var(--muted); font-size: 0.85rem; text-align: center; margin-top: 0.3rem; font-family: 'JetBrains Mono', monospace; }
  .login-box { background: var(--surface); border: 1px solid var(--border2); border-radius: 20px; padding: 2rem; width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 1rem; box-shadow: 0 0 60px rgba(124,106,255,0.08); }
  .login-box p { font-size: 0.8rem; color: var(--muted); text-align: center; line-height: 1.6; font-family: 'JetBrains Mono', monospace; }
  .btn-google { display: flex; align-items: center; justify-content: center; gap: 0.75rem; background: linear-gradient(135deg, #1a0f3c, #2d1a6e); border: 1px solid var(--accent); border-radius: 12px; padding: 0.875rem 1.25rem; color: var(--text); font-family: 'Syne', sans-serif; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.2s; text-decoration: none; box-shadow: 0 0 20px rgba(124,106,255,0.1); }
  .btn-google:hover { background: linear-gradient(135deg, #220f4a, #3d1a8e); box-shadow: 0 0 30px rgba(124,106,255,0.25); transform: translateY(-1px); }
  .divider { display: flex; align-items: center; gap: 0.75rem; color: var(--muted); font-size: 0.7rem; font-family: 'JetBrains Mono', monospace; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .btn-skip { background: none; border: 1px solid var(--border2); border-radius: 12px; padding: 0.75rem 1.25rem; color: var(--muted); font-family: 'Syne', sans-serif; font-size: 0.85rem; cursor: pointer; transition: all 0.15s; }
  .btn-skip:hover { color: var(--text); border-color: var(--accent); }
  #app { display: none; flex-direction: column; height: 100dvh; }
  header { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 1.25rem; border-bottom: 1px solid var(--border); background: rgba(8,8,16,0.9); backdrop-filter: blur(12px); flex-shrink: 0; }
  .header-left { display: flex; align-items: center; gap: 0.75rem; }
  .logo-sm { width: 34px; height: 34px; border-radius: 10px; background: linear-gradient(135deg, #1a0f3c, #2d1a6e); border: 1px solid var(--accent); display: flex; align-items: center; justify-content: center; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--accent2); box-shadow: 0 0 12px rgba(124,106,255,0.2); }
  .header-name { font-size: 1rem; font-weight: 700; letter-spacing: -0.3px; background: linear-gradient(135deg, var(--text), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .header-right { display: flex; align-items: center; gap: 0.4rem; }
  .user-badge { display: flex; align-items: center; gap: 0.4rem; background: var(--surface); border: 1px solid var(--border2); border-radius: 8px; padding: 0.3rem 0.65rem; font-size: 0.72rem; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
  .user-badge .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); }
  .btn-icon { background: none; border: 1px solid var(--border); border-radius: 9px; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; color: var(--muted); cursor: pointer; transition: all 0.15s; font-size: 0.95rem; }
  .btn-icon:hover { color: var(--text); border-color: var(--border2); background: var(--surface); }
  .btn-icon.active { color: var(--accent2); border-color: var(--accent); background: var(--accent-glow); box-shadow: 0 0 12px rgba(124,106,255,0.2); }
  .quick-actions { display: flex; gap: 0.4rem; padding: 0.6rem 1.25rem; overflow-x: auto; scrollbar-width: none; flex-shrink: 0; border-bottom: 1px solid var(--border); }
  .quick-actions::-webkit-scrollbar { display: none; }
  .chip { display: flex; align-items: center; gap: 0.35rem; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 0.3rem 0.7rem; font-size: 0.72rem; color: var(--muted); cursor: pointer; white-space: nowrap; transition: all 0.15s; flex-shrink: 0; font-family: 'JetBrains Mono', monospace; }
  .chip:hover { color: var(--text); border-color: var(--accent); background: var(--accent-glow); }
  #messages { flex: 1; overflow-y: auto; padding: 1.25rem; display: flex; flex-direction: column; gap: 1.25rem; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
  .msg { display: flex; flex-direction: column; gap: 0.3rem; max-width: 88%; animation: fadeUp 0.2s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.ai { align-self: flex-start; align-items: flex-start; }
  .bubble { padding: 0.75rem 1rem; border-radius: 16px; font-size: 0.875rem; line-height: 1.65; }
  .msg.user .bubble { background: var(--user-bubble); border: 1px solid var(--user-border); border-bottom-right-radius: 4px; color: #a0b4d0; }
  .msg.ai .bubble { background: var(--surface); border: 1px solid var(--border2); border-bottom-left-radius: 4px; position: relative; }
  .msg.ai .bubble::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; background: linear-gradient(180deg, var(--accent), transparent); border-radius: 2px 0 0 2px; }
  .msg.ai .bubble strong { color: var(--accent2); font-weight: 600; }
  .msg-label { font-size: 0.62rem; color: var(--muted); padding: 0 0.3rem; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.5px; text-transform: uppercase; }
  .msg-image { max-width: 200px; border-radius: 10px; border: 1px solid var(--border2); margin-bottom: 0.5rem; display: block; }
  .typing .bubble { display: flex; align-items: center; gap: 5px; padding: 0.875rem 1rem; }
  .typing-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--muted); animation: bounce 1.2s infinite; }
  .typing-dot:nth-child(2){animation-delay:0.2s} .typing-dot:nth-child(3){animation-delay:0.4s}
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px);background:var(--accent2)} }
  .welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 0.75rem; padding: 2rem; text-align: center; }
  .welcome-icon { width: 60px; height: 60px; border-radius: 18px; background: linear-gradient(135deg, #1a0f3c, #2d1a6e); border: 1px solid var(--accent); display: flex; align-items: center; justify-content: center; font-family: 'JetBrains Mono', monospace; font-size: 1.25rem; color: var(--accent2); box-shadow: 0 0 30px rgba(124,106,255,0.2); margin-bottom: 0.5rem; }
  .welcome h2 { font-size: 1.3rem; font-weight: 600; letter-spacing: -0.3px; }
  .welcome p { font-size: 0.8rem; color: var(--muted); max-width: 280px; line-height: 1.6; font-family: 'JetBrains Mono', monospace; }
  .input-area { padding: 0.875rem 1.25rem; border-top: 1px solid var(--border); background: rgba(8,8,16,0.9); backdrop-filter: blur(12px); flex-shrink: 0; }
  #image-preview-container { display: none; padding: 0.5rem 1rem 0; position: relative; }
  #image-preview { max-height: 80px; border-radius: 8px; border: 1px solid var(--border2); }
  #remove-image { position: absolute; top: 0.25rem; right: 0.75rem; background: var(--red); border: none; border-radius: 50%; width: 20px; height: 20px; color: white; font-size: 0.7rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .input-row { display: flex; align-items: flex-end; gap: 0.5rem; background: var(--surface); border: 1px solid var(--border2); border-radius: 16px; padding: 0.625rem 0.625rem 0.625rem 1rem; transition: border-color 0.15s, box-shadow 0.15s; }
  .input-row:focus-within { border-color: var(--accent); box-shadow: 0 0 20px rgba(124,106,255,0.1); }
  #input { flex: 1; background: none; border: none; outline: none; color: var(--text); font-family: 'Syne', sans-serif; font-size: 0.875rem; resize: none; max-height: 120px; line-height: 1.5; padding: 0.25rem 0; }
  #input::placeholder { color: var(--muted); }
  .input-actions { display: flex; gap: 0.3rem; align-items: center; }
  .btn-mic, .btn-image { background: none; border: 1px solid var(--border); border-radius: 9px; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--muted); transition: all 0.15s; font-size: 0.95rem; flex-shrink: 0; }
  .btn-mic:hover, .btn-image:hover { color: var(--text); border-color: var(--border2); }
  .btn-mic.recording { color: var(--red); border-color: var(--red); background: rgba(248,113,113,0.1); animation: micPulse 1s infinite; }
  @keyframes micPulse { 0%,100%{box-shadow:0 0 0 0 rgba(248,113,113,0.4)} 50%{box-shadow:0 0 0 6px rgba(248,113,113,0)} }
  .btn-send { background: linear-gradient(135deg, var(--accent), #5a4adf); border: none; border-radius: 10px; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: white; transition: all 0.15s; flex-shrink: 0; box-shadow: 0 0 15px rgba(124,106,255,0.3); }
  .btn-send:hover { transform: scale(1.05); box-shadow: 0 0 25px rgba(124,106,255,0.5); }
  .btn-send:disabled { opacity: 0.3; cursor: not-allowed; transform: none; box-shadow: none; }
  .char-hint { font-size: 0.62rem; color: var(--muted); text-align: center; margin-top: 0.4rem; font-family: 'JetBrains Mono', monospace; }
  .action-card { border-radius: 14px; padding: 1rem; margin: 0 1.25rem; }
  .action-card.email, .action-card.reply { border: 1px solid var(--accent); background: rgba(124,106,255,0.05); }
  .action-card.event { border: 1px solid var(--green); background: rgba(74,222,128,0.05); }
  .action-card.delete { border: 1px solid var(--red); background: rgba(248,113,113,0.05); }
  .action-label { font-size: 0.62rem; color: var(--muted); margin-bottom: 0.5rem; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.5px; text-transform: uppercase; }
  .action-field { font-size: 0.82rem; color: var(--text); margin-bottom: 0.2rem; line-height: 1.5; }
  .action-field strong { color: var(--accent2); font-weight: 500; }
  .action-card.event .action-field strong { color: var(--green); }
  .action-card.delete .action-field strong { color: var(--red); }
  .action-body { font-size: 0.75rem; color: var(--muted); margin-bottom: 0.75rem; white-space: pre-wrap; line-height: 1.5; font-family: 'JetBrains Mono', monospace; }
  .action-btns { display: flex; gap: 0.4rem; margin-top: 0.75rem; }
  .btn-confirm { border: none; border-radius: 8px; padding: 0.45rem 0.875rem; font-weight: 600; cursor: pointer; font-size: 0.8rem; font-family: 'Syne', sans-serif; transition: all 0.15s; }
  .btn-confirm.purple { background: var(--accent); color: white; }
  .btn-confirm.purple:hover { background: var(--accent2); }
  .btn-confirm.green { background: var(--green); color: #022c22; }
  .btn-confirm.green:hover { filter: brightness(1.1); }
  .btn-confirm.red { background: var(--red); color: white; }
  .btn-confirm.red:hover { filter: brightness(1.1); }
  .btn-cancel-action { background: none; border: 1px solid var(--border2); border-radius: 8px; padding: 0.45rem 0.875rem; color: var(--muted); cursor: pointer; font-size: 0.8rem; font-family: 'Syne', sans-serif; transition: all 0.15s; }
  .btn-cancel-action:hover { color: var(--text); }
  #messages::-webkit-scrollbar { width: 3px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<div id="login-screen">
  <div style="display:flex;flex-direction:column;align-items:center;gap:1rem">
    <div class="logo-hex">Nx</div>
    <div class="login-title">
      <h1>Nexus</h1>
      <p>// assistant_ia_personnel</p>
    </div>
  </div>
  <div class="login-box">
    <p>Connecte ton compte Google pour acceder a tes emails et ton agenda.</p>
    <a class="btn-google" href="/auth">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2.01c-.72.48-1.63.77-2.7.77-2.08 0-3.84-1.4-4.47-3.28H1.83v2.07A8 8 0 0 0 8.98 17z"/><path fill="#FBBC05" d="M4.51 10.54A4.8 4.8 0 0 1 4.26 9c0-.53.09-1.05.25-1.54V5.39H1.83A8 8 0 0 0 .98 9c0 1.29.31 2.51.85 3.61l2.68-2.07z"/><path fill="#EA4335" d="M8.98 3.58c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 .98 9l2.83 2.17C4.14 9 6.43 3.58 8.98 3.58z"/></svg>
      Continuer avec Google
    </a>
    <div class="divider">ou</div>
    <button class="btn-skip" onclick="startWithoutGoogle()">Utiliser sans Gmail / Agenda</button>
  </div>
</div>

<div id="app">
  <header>
    <div class="header-left">
      <div class="logo-sm">Nx</div>
      <span class="header-name">Nexus</span>
      <div class="status-dot"></div>
    </div>
    <div class="header-right">
      <div class="user-badge" id="user-badge" style="display:none"><div class="dot"></div><span>Google</span></div>
      <button class="btn-icon" id="btn-voice" title="Voix auto" onclick="toggleVoice()">🔈</button>
      <button class="btn-icon" title="Deconnexion" onclick="logout()">↩</button>
    </div>
  </header>

  <div class="quick-actions">
    <button class="chip" onclick="quickAsk('Resume mes 5 derniers emails')">📧 emails</button>
    <button class="chip" onclick="quickAsk('Quels sont mes rendez-vous aujourd\'hui ?')">📅 agenda</button>
    <button class="chip" onclick="quickAsk('Y a-t-il des emails urgents ?')">⚡ urgent</button>
    <button class="chip" onclick="quickAsk('Qu\'est-ce que j\'ai de prevu cette semaine ?')">🗓️ semaine</button>
    <button class="chip" onclick="quickAsk('Quels emails sont non lus ?')">🔔 non lus</button>
    <button class="chip" onclick="quickAsk('Donne-moi mon briefing du matin')">☀️ briefing</button>
  </div>

  <div id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">Nx</div>
      <h2>Bonjour, je suis Nexus</h2>
      <p id="welcome-sub">Pose-moi n'importe quelle question, envoie une image ou parle-moi.</p>
    </div>
  </div>

  <div id="image-preview-container">
    <img id="image-preview" src="" alt="preview"/>
    <button id="remove-image" onclick="removeImage()">x</button>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="input" placeholder="Parle a Nexus..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <div class="input-actions">
        <input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleImageUpload(event)">
        <button class="btn-image" onclick="document.getElementById('file-input').click()" title="Image">🖼️</button>
        <button class="btn-mic" id="btn-mic" onclick="toggleMic()" title="Parler">🎤</button>
        <button class="btn-send" id="btn-send" onclick="sendMessage()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
    <div class="char-hint">enter envoyer · shift+enter nouvelle ligne · mic parler</div>
  </div>
</div>

<script>
  let messages = [], accessToken = null, voiceEnabled = false, hasGoogle = false, currentImage = null, recognition = null, isRecording = false;

  function init() {
    const params = new URLSearchParams(window.location.search);
    const token = params.get('access_token');
    const refresh = params.get('refresh_token');
    if (token) {
      accessToken = token; hasGoogle = true;
      if (refresh) localStorage.setItem('nexus_refresh', refresh);
      localStorage.setItem('nexus_token', token);
      localStorage.setItem('nexus_token_time', Date.now().toString());
      window.history.replaceState({}, '', '/');
      showApp(true);
    } else {
      const saved = localStorage.getItem('nexus_token');
      const age = Date.now() - parseInt(localStorage.getItem('nexus_token_time') || '0');
      if (saved && age < 55 * 60 * 1000) { accessToken = saved; hasGoogle = true; showApp(true); }
      else if (localStorage.getItem('nexus_refresh')) { refreshAccessToken(); }
      else { document.getElementById('login-screen').style.display = 'flex'; }
    }
  }

  async function refreshAccessToken() {
    const refreshToken = localStorage.getItem('nexus_refresh');
    if (!refreshToken) { document.getElementById('login-screen').style.display = 'flex'; return; }
    try {
      const res = await fetch('/api/refresh', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ refresh_token: refreshToken }) });
      const data = await res.json();
      if (data.access_token) { accessToken = data.access_token; hasGoogle = true; localStorage.setItem('nexus_token', accessToken); localStorage.setItem('nexus_token_time', Date.now().toString()); showApp(true); }
      else { localStorage.clear(); document.getElementById('login-screen').style.display = 'flex'; }
    } catch(e) { document.getElementById('login-screen').style.display = 'flex'; }
  }

  setInterval(async () => {
    const rt = localStorage.getItem('nexus_refresh'); if (!rt) return;
    const age = Date.now() - parseInt(localStorage.getItem('nexus_token_time') || '0');
    if (age > 50 * 60 * 1000) await refreshAccessToken();
  }, 60 * 1000);

  function showApp(withGoogle) {
    if (withGoogle && accessToken) { localStorage.setItem('nexus_token', accessToken); document.getElementById('user-badge').style.display = 'flex'; document.getElementById('welcome-sub').textContent = 'Gmail et Agenda connectes. Pose-moi n\'importe quelle question !'; hasGoogle = true; }
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('input').focus();
    startChecks();
  }

  function startWithoutGoogle() { showApp(false); }
  function logout() { localStorage.clear(); accessToken = null; hasGoogle = false; messages = []; document.getElementById('login-screen').style.display = 'flex'; document.getElementById('app').style.display = 'none'; }

  function handleImageUpload(event) {
    const file = event.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => { currentImage = e.target.result; document.getElementById('image-preview').src = currentImage; document.getElementById('image-preview-container').style.display = 'block'; };
    reader.readAsDataURL(file);
  }

  function removeImage() { currentImage = null; document.getElementById('image-preview-container').style.display = 'none'; document.getElementById('file-input').value = ''; }

  function toggleMic() {
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) { addMessage('ai', 'Reconnaissance vocale non supportee sur ce navigateur.'); return; }
    if (isRecording) { recognition && recognition.stop(); return; }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR(); recognition.lang = 'fr-FR'; recognition.continuous = false; recognition.interimResults = false;
    recognition.onstart = () => { isRecording = true; document.getElementById('btn-mic').classList.add('recording'); };
    recognition.onresult = (event) => { const t = event.results[0][0].transcript; document.getElementById('input').value = t; autoResize(document.getElementById('input')); sendMessage(); };
    recognition.onend = () => { isRecording = false; document.getElementById('btn-mic').classList.remove('recording'); };
    recognition.onerror = () => { isRecording = false; document.getElementById('btn-mic').classList.remove('recording'); };
    recognition.start();
  }

  function toggleVoice() {
    voiceEnabled = !voiceEnabled;
    const btn = document.getElementById('btn-voice');
    btn.classList.toggle('active', voiceEnabled);
    btn.textContent = voiceEnabled ? '🔊' : '🔈';
    if (voiceEnabled) speak('Voix activee. Je suis Nexus.');
  }

  function speak(text) {
    if (!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const clean = text.replace(/\*\*/g, '').replace(/<[^>]*>/g, '').replace(/\$[^$]*\$/g, 'expression mathematique');
    const utt = new SpeechSynthesisUtterance(clean); utt.lang = 'fr-FR'; utt.rate = 1.05;
    const voices = window.speechSynthesis.getVoices();
    const frVoice = voices.find(v => v.lang.startsWith('fr'));
    if (frVoice) utt.voice = frVoice;
    window.speechSynthesis.speak(utt);
  }

  function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
  function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }
  function quickAsk(text) { document.getElementById('input').value = text; sendMessage(); }

  function addMessage(role, text, imageData) {
    const welcome = document.getElementById('welcome'); if (welcome) welcome.remove();
    const container = document.getElementById('messages');
    const div = document.createElement('div'); div.className = 'msg ' + role;
    const label = document.createElement('div'); label.className = 'msg-label'; label.textContent = role === 'user' ? 'toi' : 'nexus';
    const bubble = document.createElement('div'); bubble.className = 'bubble';
    if (imageData) { const img = document.createElement('img'); img.src = imageData; img.className = 'msg-image'; bubble.appendChild(img); }
    const textDiv = document.createElement('div');
    textDiv.innerHTML = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
    bubble.appendChild(textDiv);
    div.appendChild(label); div.appendChild(bubble); container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    if (role === 'ai' && window.MathJax) MathJax.typesetPromise([bubble]).catch(()=>{});
    return div;
  }

  function addTyping() {
    const container = document.getElementById('messages');
    const div = document.createElement('div'); div.className = 'msg ai typing'; div.id = 'typing';
    div.innerHTML = '<div class="msg-label">nexus</div><div class="bubble"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
    container.appendChild(div); container.scrollTop = container.scrollHeight;
  }

  function removeTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }

  async function sendMessage() {
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text && !currentImage) return;
    const imageToSend = currentImage;
    input.value = ''; input.style.height = 'auto';
    document.getElementById('btn-send').disabled = true;
    removeImage();
    addMessage('user', text || 'Image envoyee', imageToSend);

    let userContent;
    if (imageToSend) {
      const base64 = imageToSend.split(',')[1];
      const mimeType = imageToSend.split(';')[0].split(':')[1];
      userContent = [{ type: 'image_url', image_url: { url: 'data:' + mimeType + ';base64,' + base64 } }, { type: 'text', text: text || 'Decris et analyse cette image.' }];
    } else { userContent = text; }

    messages.push({ role: 'user', content: userContent });
    addTyping();

    try {
      const body = { messages };
      if (hasGoogle && accessToken) body.accessToken = accessToken;
      const res = await fetch('/api/chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      const data = await res.json();
      removeTyping();
      const reply = data.content?.[0]?.text || "Je n'ai pas pu traiter ta demande.";
      messages.push({ role: 'assistant', content: reply });

      const deleteMatch = reply.match(/DELETE_EVENT\[eventId:(.*?)\|summary:(.*?)\]/s);
      const eventMatch = reply.match(/CREATE_EVENT\[summary:(.*?)\|start:(.*?)\|end:(.*?)(?:\|location:(.*?))?(?:\|description:(.*?))?\]/s);
      const emailMatch = reply.match(/SEND_EMAIL\[to:(.*?)\|subject:(.*?)\|body:(.*?)\]/s);
      const replyMatch = reply.match(/REPLY_EMAIL\[to:(.*?)\|subject:(.*?)\|body:(.*?)\|threadId:(.*?)\]/s);
      const memoryMatch = reply.match(/SAVE_MEMORY\[(.*?)\]/s);

      if (memoryMatch) {
        const pairs = memoryMatch[1].split('|'); const memoryData = {};
        pairs.forEach(pair => { const [key, ...v] = pair.split(':'); if (key && v.length) memoryData[key.trim()] = v.join(':').trim(); });
        fetch('/api/memory', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(memoryData) });
      }

      const cleanReply = reply.replace(/DELETE_EVENT\[.*?\]/s,'').replace(/CREATE_EVENT\[.*?\]/s,'').replace(/SEND_EMAIL\[.*?\]/s,'').replace(/REPLY_EMAIL\[.*?\]/s,'').replace(/SAVE_MEMORY\[.*?\]/s,'').trim();

      if (deleteMatch && hasGoogle) { showActionCard('delete', { eventId: deleteMatch[1].trim(), summary: deleteMatch[2].trim() }); addMessage('ai', cleanReply || 'Je vais supprimer cet evenement. Confirme ci-dessous.'); }
      else if (eventMatch && hasGoogle) { showActionCard('event', { summary: eventMatch[1].trim(), start: eventMatch[2].trim(), end: eventMatch[3].trim(), location: eventMatch[4]?.trim()||'' }); addMessage('ai', cleanReply || 'Je vais creer cet evenement. Confirme ci-dessous.'); }
      else if (emailMatch && hasGoogle) { showActionCard('email', { to: emailMatch[1].trim(), subject: emailMatch[2].trim(), body: emailMatch[3].trim() }); addMessage('ai', cleanReply || 'Je vais envoyer cet email. Confirme ci-dessous.'); }
      else if (replyMatch && hasGoogle) { showActionCard('reply', { to: replyMatch[1].trim(), subject: replyMatch[2].trim(), body: replyMatch[3].trim(), threadId: replyMatch[4].trim() }); addMessage('ai', cleanReply || 'Je vais repondre a cet email. Confirme ci-dessous.'); }
      else { addMessage('ai', cleanReply || reply); }

      if (voiceEnabled) speak(cleanReply || reply);
    } catch(e) { removeTyping(); addMessage('ai', 'Erreur de connexion.'); }

    document.getElementById('btn-send').disabled = false;
    document.getElementById('input').focus();
  }

  function showActionCard(type, data) {
    const existing = document.getElementById('action-card'); if (existing) existing.remove();
    const div = document.createElement('div'); div.id = 'action-card';
    div.className = 'action-card ' + (type === 'delete' ? 'delete' : type === 'event' ? 'event' : 'email');
    const label = document.createElement('div'); label.className = 'action-label';
    const labels = { email: 'email a envoyer', reply: 'reponse a envoyer', event: 'evenement a creer', delete: 'evenement a supprimer' };
    label.textContent = labels[type]; div.appendChild(label);

    function addField(parent, l, v) { const d = document.createElement('div'); d.className = 'action-field'; d.innerHTML = '<strong>' + l + ' :</strong> ' + v; parent.appendChild(d); }

    if (type === 'email' || type === 'reply') {
      addField(div, 'A', data.to); addField(div, 'Objet', type === 'reply' ? 'Re: ' + data.subject : data.subject);
      const bodyDiv = document.createElement('div'); bodyDiv.className = 'action-body'; bodyDiv.textContent = data.body; div.appendChild(bodyDiv);
    } else if (type === 'event') {
      addField(div, 'Titre', data.summary);
      const start = new Date(data.start).toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long', hour:'2-digit', minute:'2-digit', timeZone:'Europe/Brussels' });
      const end = new Date(data.end).toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit', timeZone:'Europe/Brussels' });
      addField(div, 'Quand', start + ' -> ' + end);
      if (data.location) addField(div, 'Lieu', data.location);
    } else if (type === 'delete') { addField(div, 'Titre', data.summary); }

    const btnRow = document.createElement('div'); btnRow.className = 'action-btns';
    const btnConfirm = document.createElement('button');
    btnConfirm.className = 'btn-confirm ' + (type === 'delete' ? 'red' : type === 'event' ? 'green' : 'purple');
    const btnLabels = { email: 'Envoyer', reply: 'Repondre', event: 'Creer', delete: 'Supprimer' };
    btnConfirm.textContent = btnLabels[type];
    btnConfirm.addEventListener('click', () => executeAction(type, data));
    const btnCancel = document.createElement('button'); btnCancel.className = 'btn-cancel-action'; btnCancel.textContent = 'Annuler';
    btnCancel.addEventListener('click', () => div.remove());
    btnRow.appendChild(btnConfirm); btnRow.appendChild(btnCancel); div.appendChild(btnRow);
    document.getElementById('messages').appendChild(div);
    document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
  }

  async function executeAction(type, data) {
    const card = document.getElementById('action-card'); if (card) card.remove();
    addTyping();
    try {
      const endpoints = { email: '/api/send-email', reply: '/api/reply-email', event: '/api/create-event', delete: '/api/delete-event' };
      const body = type === 'delete' ? { accessToken, eventId: data.eventId } : { accessToken, ...data };
      const res = await fetch(endpoints[type], { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      const result = await res.json(); removeTyping();
      const msgs = { email: 'Email envoye a ' + data.to, reply: 'Reponse envoyee a ' + data.to, event: 'Evenement cree : ' + data.summary, delete: 'Evenement supprime : ' + data.summary };
      addMessage('ai', result.success ? '✅ **' + msgs[type] + '** !' : '❌ Erreur : ' + result.error);
    } catch(e) { removeTyping(); addMessage('ai', 'Erreur de connexion.'); }
  }

  async function requestNotificationPermission() { if ('Notification' in window && Notification.permission === 'default') await Notification.requestPermission(); }
  function sendNotification(title, body) { if (Notification.permission !== 'granted') return; const n = new Notification(title, { body }); n.onclick = () => window.focus(); }

  let lastEmailCount = 0;
  async function checkNewEmails() {
    if (!hasGoogle || !accessToken) return;
    try {
      const res = await fetch('/api/chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ accessToken, messages: [{ role: 'user', content: 'Combien ai-je d emails non lus ? Reponds uniquement avec un nombre entier.' }] }) });
      const data = await res.json();
      const count = parseInt(data.content?.[0]?.text?.match(/\d+/)?.[0] || '0');
      if (count > lastEmailCount && lastEmailCount !== 0) sendNotification('📧 Nouveau message', 'Tu as ' + count + ' emails non lus');
      lastEmailCount = count;
    } catch(e) {}
  }

  function checkMorningBriefing() {
    const now = new Date(); const hours = now.getHours();
    const lastBriefing = localStorage.getItem('nexus_last_briefing'); const today = now.toDateString();
    if (hours >= 7 && hours < 10 && lastBriefing !== today && hasGoogle) {
      localStorage.setItem('nexus_last_briefing', today);
      setTimeout(() => { sendNotification('☀️ Bonjour !', 'Ton briefing Nexus est pret.'); setTimeout(() => quickAsk('Donne-moi mon briefing du matin : agenda du jour et emails importants'), 2000); }, 3000);
    }
  }

  function startChecks() { requestNotificationPermission(); checkMorningBriefing(); setInterval(checkNewEmails, 5 * 60 * 1000); setInterval(checkMorningBriefing, 60 * 1000); }

  init();
</script>
